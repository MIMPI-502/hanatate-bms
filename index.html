<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花立山養鰻 業務管理</title>
<style>
body{margin:0;background:#F0EDE8;font-family:'Helvetica Neue',Arial,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;}
.card{background:white;border-radius:16px;padding:32px 24px;width:100%;max-width:320px;box-shadow:0 4px 20px rgba(0,0,0,0.1);}
.title{background:#1A2744;border-radius:12px;padding:24px;text-align:center;margin-bottom:16px;}
.title h1{color:#E8B85A;margin:0;font-size:22px;}
.title p{color:rgba(255,255,255,0.6);margin:4px 0 0;font-size:12px;}
input{width:100%;padding:12px 14px;border-radius:8px;border:2px solid #D8D2C8;font-size:15px;box-sizing:border-box;margin-bottom:8px;}
button{width:100%;padding:13px;border-radius:8px;background:#1A2744;color:white;font-weight:700;font-size:15px;border:none;cursor:pointer;}
.error{color:#C0392B;font-size:12px;margin-bottom:8px;}
</style>
</head>
<body>
<div class="card">
  <div class="title">
    <h1>花立山養鰻</h1>
    <p>業務管理システム</p>
  </div>
  <p style="font-size:13px;color:#5A5A5A;margin-bottom:10px;">パスワードを入力してください</p>
  <input type="password" id="pw" placeholder="パスワード" onkeydown="if(event.key==='Enter')login()">
  <div id="err" class="error" style="display:none">パスワードが正しくありません</div>
  <button onclick="login()">ログイン</button>
</div>
<script>
function login(){
  var pw=document.getElementById('pw').value;
  if(pw==='hanatate2026'){
    window.location.href='/main.html';
  } else {
    document.getElementById('err').style.display='block';
    setTimeout(function(){document.getElementById('err').style.display='none';},2000);
  }
}
</script>
</body>
</html>
