const getFnSalesPrice = (productName) => {
  if (!productName) return 0;
  for (const [key, val] of Object.entries(FN_PRICE_MAP)) {
    if (productName.includes(key.replace('尾','').trim()) ||
        (productName.includes('蒲焼') && productName.includes('2尾')) ||
        (productName.includes('蒲焼') && productName.includes('3尾')) ||
        (productName.includes('蒲焼') && productName.includes('4尾')) ||
        (productName.includes('蒲焼') && productName.includes('5尾')) ||
        (productName.includes('白焼') && productName.includes('2尾')) ||
        (productName.includes('白焼') && productName.includes('3尾')) ||
        (productName.includes('白焼') && productName.includes('4尾')) ||
        (productName.includes('白焼') && productName.includes('5尾'))) {
      // 蒲焼か白焼かと尾数で判定
      const is蒲焼 = productName.includes('蒲焼');
      const is白焼 = productName.includes('白焼');
      const has2 = productName.includes('2尾') || productName.includes('2 尾');
      const has3 = productName.includes('3尾') || productName.includes('3 尾');
      const has4 = productName.includes('4尾') || productName.includes('4 尾');
      const has5 = productName.includes('5尾') || productName.includes('5 尾');
      if (is蒲焼 && has2) return 3900;
      if (is蒲焼 && has3) return 5400;
      if (is蒲焼 && has4) return 7200;
      if (is蒲焼 && has5) return 9000;
      if (is白焼 && has2) return 4200;
      if (is白焼 && has3) return 6000;
      if (is白焼 && has4) return 8100;
      if (is白焼 && has5) return 10200;
    }
  }
  return 0;
};


// ── Supabaseクライアント ──
const toSnake=s=>s.replace(/[A-Z]/g,m=>"_"+m.toLowerCase());
const toCamel=s=>s.replace(/_([a-z])/g,(_,c)=>c.toUpperCase());
const keysToSnake=o=>{if(Array.isArray(o))return o.map(keysToSnake);if(o&&typeof o==="object"){const r={};for(const k in o)r[toSnake(k)]=o[k];return r;}return o;};
const keysToCamel=o=>{if(Array.isArray(o))return o.map(keysToCamel);if(o&&typeof o==="object"){const r={};for(const k in o)r[toCamel(k)]=o[k];return r;}return o;};
class SB{
  constructor(u,k){this.u=u;this.k=k;}
  h(){return{"apikey":this.k,"Authorization":"Bearer "+this.k,"Content-Type":"application/json","Prefer":"return=representation"};}
  async select(t){const r=await fetch(`${this.u}/rest/v1/${t}?select=*`,{headers:this.h()});if(!r.ok)throw new Error(await r.text());return keysToCamel(await r.json());}
  async upsert(t,d){const r=await fetch(`${this.u}/rest/v1/${t}`,{method:"POST",headers:{...this.h(),"Prefer":"resolution=merge-duplicates,return=representation"},body:JSON.stringify(keysToSnake(Array.isArray(d)?d:[d]))});if(!r.ok)throw new Error(await r.text());return keysToCamel(await r.json());}
  async del(t,col,val){const r=await fetch(`${this.u}/rest/v1/${t}?${toSnake(col)}=eq.${encodeURIComponent(val)}`,{method:"DELETE",headers:this.h()});if(!r.ok)throw new Error(await r.text());}
}
const db=new SB(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_ANON_KEY);

async function lineMessage(msg){
  if(IS_DEMO){console.log("[LINE Messaging API デモ]\n"+msg);return;}
  try{
    const res=await fetch("/api/line-message",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:msg}),
    });
    const data=await res.json();
    if(!res.ok||!data.ok){console.error("LINE通知失敗:",data);}
    else{console.log("LINE通知成功:",data);}
  }catch(e){console.error("LINE通知エラー:",e);}
}

// ── CSV出力 ──
function exportCSV(data,name){
  if(!data||!data.length)return;
  const keys=Object.keys(data[0]);
  const rows=[keys.join(","),...data.map(r=>keys.map(k=>`"${String(r[k]??'').replace(/"/g,'""')}"`).join(","))];
  const blob=new Blob(["\uFEFF"+rows.join("\n")],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`花立山養鰻_${name}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

              <Lbl t={t("ecQty")}/><Inp type="number" value={detail.qty} onChange={v=>setDetail(p=>({...p,qty:Number(v)}))}/>
              <Lbl t={t("ecAmount")}/><Inp type="number" value={detail.amount} onChange={v=>setDetail(p=>({...p,amount:Number(v)}))}/>
              <Lbl t={t("ecShipDate")}/><Inp type="date" value={detail.shipDate||""} onChange={v=>setDetail(p=>({...p,shipDate:v}))}/>
              <Lbl t={t("ecMemo")}/><Inp value={detail.memo||""} onChange={v=>setDetail(p=>({...p,memo:v}))} placeholder={t("ecMemoPlaceholder")}/>
              <div style={{display:"flex",gap:8,marginTop:14}}>
                <button onClick={()=>setEditMode(false)} style={{flex:1,padding:"12px 0",borderRadius:8,border:`1px solid ${C.border}`,background:"white",fontSize:13,cursor:"pointer",fontWeight:600}}>{t("back")}</button>
                <button onClick={()=>{setOrders(p=>p.map(o=>o.id===detail.id?{...detail,alert:!detail.stock||!detail.payment||detail.status==="未対応"}:o));setEditMode(false);showToast(t("wsEditDone"));}} style={{flex:1,padding:"12px 0",borderRadius:8,background:C.navy,color:"white",fontWeight:700,fontSize:13,border:"none",cursor:"pointer"}}>{t("saveDone")}</button>
              </div>
            </>
          )}
        </Modal>
      )}
      {confirm&&<Confirm msg={confirm.msg} onOk={confirm.onOk} onCancel={()=>setConfirm(null)}/>}
    </div>
  );
}

// ── 卸先タブ ──
function WholesaleTab({wholesale,setWholesale,products,clients,showToast,onSave,onDel}){
  const [detail,setDetail]=useState(null);
  const [showNew,setShowNew]=useState(false);
  const [editMode,setEditMode]=useState(false);
  const [confirm,setConfirm]=useState(null);
  const [form,setForm]=useState({client:"",tel:"",product:"",qty:1,unitPrice:0,shipDate:"",memo:""});
  const upd=(id,f,v)=>{setWholesale(p=>p.map(w=>w.id===id?{...w,[f]:v}:w));setDetail(p=>p&&p.id===id?{...p,[f]:v}:p);};
  const selClient=n=>{const c=clients.find(c=>c.name===n);if(c)setForm(f=>({...f,client:c.name,tel:c.tel}));else setForm(f=>({...f,client:n}));};
  const selProd=n=>{const p=products.find(p=>p.name===n);if(p)setForm(f=>({...f,product:p.name,unitPrice:p.price}));else setForm(f=>({...f,product:n}));};
  const addWS=()=>{
    if(!form.client||!form.product){showToast(t("wsErrInput"),"error");return;}
    const w={id:genId("WS"),client:form.client,tel:form.tel,product:form.product,qty:Number(form.qty),unitPrice:Number(form.unitPrice),amount:Number(form.qty)*Number(form.unitPrice),orderStatus:"受注入力済",purchaseStatus:"未発注",deliveryStatus:"未確定",invoiceIssued:false,salesRecorded:false,shipDate:form.shipDate,created:today(),memo:form.memo};
    setWholesale(p=>[w,...p]);setShowNew(false);
    setForm({client:"",tel:"",product:"",qty:1,unitPrice:0,shipDate:"",memo:""});
    showToast(t("wsAddDone"));
  };
  const doDelete=id=>{setConfirm({msg:t("wsDelMsg"),onOk:async()=>{setWholesale(p=>p.filter(w=>w.id!==id));await onDel("ws_orders","id",id);setDetail(null);setConfirm(null);showToast("削除しました");}});};

        <SummaryCard label={t("wsUnrecorded")} value={wholesale.filter(w=>!w.salesRecorded).length} color={C.orange}/>
      </div>
      <button onClick={()=>setShowNew(true)} style={{width:"100%",padding:"12px 0",borderRadius:10,background:C.gold,color:"white",fontWeight:800,fontSize:14,border:"none",cursor:"pointer",marginBottom:12,boxShadow:"0 2px 8px #C8963E44"}}>{t("wsNewBtn")}</button>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {wholesale.map(w=>(
          <div key={w.id} onClick={()=>{setDetail({...w});setEditMode(false);}} style={{background:C.card,border:`1px solid ${C.border}`,borderLeft:`4px solid ${w.salesRecorded?C.green:C.orange}`,borderRadius:8,padding:"12px 14px",cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:13}}>{w.client}</div>

                <div style={{display:"flex",gap:5,marginTop:6,flexWrap:"wrap"}}>

            </div>

          <Lbl t={t("wsShipDate")}/><Inp type="date" value={form.shipDate} onChange={v=>setForm(f=>({...f,shipDate:v}))}/>
          <Lbl t={t("wsMemo")}/><Inp value={form.memo} onChange={v=>setForm(f=>({...f,memo:v}))} placeholder="備考"/>

        </Modal>
      )}
      {detail&&(
        <Modal onClose={()=>setDetail(null)} title={editMode?`${t("ecEditTitle")} ${detail.id}`:`${t("wsDetail")} ${detail.id}`}>

              <Lbl t={t("wsShipDateLbl")}/><Inp type="date" value={detail.shipDate||""} onChange={v=>{upd(detail.id,"shipDate",v);setDetail(p=>({...p,shipDate:v}));}}/>

              <FS label={t("wsPurchaseMgmt")} opts={ST_WS_P} value={detail.purchaseStatus} onChange={v=>upd(detail.id,"purchaseStatus",v)}/>

    ...wholesale.filter(w=>w.shipDate===today()&&w.deliveryStatus!=="仕入確定").map(w=>({label:`卸: ${w.client}`,sub:t("alertDelivSub"),color:C.gold})),

      {shipA.length>0&&(<div style={{marginBottom:14}}><div style={{fontWeight:700,fontSize:13,color:C.orange,marginBottom:8,paddingBottom:6,borderBottom:`2px solid ${C.orange}33`}}>{t("alertTodayShip")}</div>{shipA.map((s,i)=><Card key={i} title={s.label} sub={s.sub} color={s.color}/>)}</div>)}
      <div style={{fontWeight:700,fontSize:13,color:C.cyan,marginBottom:8,paddingBottom:6,borderBottom:`2px solid ${C.cyan}33`}}>{t("alertEcSection")}</div>
      {ecA.length===0?<div style={{fontSize:13,color:C.green,padding:"8px 0 14px"}}>✅ アラートなし</div>:ecA.map(o=>(<Card key={o.id} title={`${o.id} — ${o.customer}`} sub={o.product} issues={[!o.stock&&t("alertNoStock"),!o.payment&&t("alertNoPayment"),o.status==="未対応"&&t("alertUnhandled"),!o.assigned&&t("alertUnassigned")].filter(Boolean)}/>))}
      <div style={{fontWeight:700,fontSize:13,color:C.gold,marginBottom:8,marginTop:6,paddingBottom:6,borderBottom:`2px solid ${C.gold}33`}}>{t("alertWsSection")}</div>
      {wsA.length===0?<div style={{fontSize:13,color:C.green,padding:"8px 0 14px"}}>✅ アラートなし</div>:wsA.map(w=>(<Card key={w.id} title={`${w.id} — ${w.client}`} sub={w.product} issues={[w.purchaseStatus==="未発注"&&t("alertNoOrder"),!w.invoiceIssued&&t("alertNoInvoice"),!w.salesRecorded&&t("alertNoSales")].filter(Boolean)}/>))}

// ── 在庫タブ ──
function InventoryTab({products,setProducts,inventory,setInventory,showToast}){
  const [showAdj,setShowAdj]=useState(null);
  const [adjQty,setAdjQty]=useState(0);
  const [adjMemo,setAdjMemo]=useState("");
  const [confirm,setConfirm]=useState(null);
  const doAdj=(prod,type)=>{
    const newQty=type==="add"?prod.stock+Number(adjQty):Math.max(0,prod.stock-Number(adjQty));
    setProducts(p=>p.map(x=>x.id===prod.id?{...x,stock:newQty}:x));
    setInventory(p=>[{id:genId("I"),product:prod.name,qty:newQty,type:type==="add"?"入庫":"出庫",date:today(),memo:adjMemo},...p]);
    setShowAdj(null);setAdjQty(0);setAdjMemo("");
    showToast(`${t("invUpdated")}（${newQty}）`);
  };
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:14}}>

function FinanceTab({orders,wholesale,furusatoOrders=[],reports,onExport}){
  const ecSales=orders.filter(o=>["発送済み","完了"].includes(o.status)).reduce((s,o)=>s+o.amount,0);
  const fnSales=furusatoOrders.reduce((s,o)=>s+getFnSalesPrice(o.productName||o.product_name),0);
  const wsSales=wholesale.filter(w=>w.salesRecorded).reduce((s,w)=>s+w.amount,0);
  const total=ecSales+wsSales+fnSales;
  const pending=wholesale.filter(w=>!w.salesRecorded).reduce((s,w)=>s+w.amount,0);
  const bd=orders.reduce((acc,o)=>{if(["発送済み","完了"].includes(o.status))acc[o.type]=(acc[o.type]||0)+o.amount;return acc;},{});
  // 月別集計を実データから生成
  const monthlyMap={};
  [...orders].forEach(o=>{
    const m=(o.shipDate||o.created||"").substring(0,7);
    if(!m)return;
    if(!monthlyMap[m])monthlyMap[m]={month:m,ec:0,furusato:0,wholesale:0};
    if(["発送済み","完了"].includes(o.status))monthlyMap[m].ec+=o.amount||0;
  });
  furusatoOrders.forEach(o=>{
    const m=(o.scheduledShipDate||o.scheduled_shipment_date||o.shipment_request_date||"").substring(0,7);
    if(!m)return;
    if(!monthlyMap[m])monthlyMap[m]={month:m,ec:0,furusato:0,wholesale:0};
    monthlyMap[m].furusato+=getFnSalesPrice(o.productName||o.product_name);
  });
  wholesale.forEach(w=>{
    const m=(w.shipDate||w.created||"").substring(0,7);
    if(!m)return;
    if(!monthlyMap[m])monthlyMap[m]={month:m,ec:0,furusato:0,wholesale:0};
    if(w.salesRecorded)monthlyMap[m].wholesale+=w.amount||0;
  });
  const dynamicReports=Object.values(monthlyMap).sort((a,b)=>a.month.localeCompare(b.month));
  const activeReports=dynamicReports.length>0?dynamicReports:reports;
  const maxBar=Math.max(...activeReports.map(r=>r.ec+r.furusato+r.wholesale),1);
  return(
    <div>
      <div style={{background:C.navy,borderRadius:10,padding:"18px 20px",marginBottom:14,color:"white"}}>
        <div style={{fontSize:11,opacity:0.7,marginBottom:4}}>{t("finMonthSales")}</div>
        <div style={{fontSize:28,fontWeight:800,color:C.goldL}}>¥{fmt(total)}</div>
        <div style={{fontSize:11,opacity:0.6,marginTop:4}}>{t("finPending")} ¥{fmt(pending)}</div>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        <button onClick={()=>onExport("ec")} style={{flex:1,padding:"10px 0",borderRadius:8,background:"white",border:`1px solid ${C.border}`,color:C.navy,fontWeight:700,fontSize:12,cursor:"pointer"}}>{t("finExportEc")}</button>
        <button onClick={()=>onExport("ws")} style={{flex:1,padding:"10px 0",borderRadius:8,background:"white",border:`1px solid ${C.border}`,color:C.navy,fontWeight:700,fontSize:12,cursor:"pointer"}}>{t("finExportWs")}</button>
        <button onClick={()=>onExport("all")} style={{flex:1,padding:"10px 0",borderRadius:8,background:C.navy,color:"white",fontWeight:700,fontSize:12,cursor:"pointer",border:"none"}}>{t("finExportAll")}</button>
      </div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:16,marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:13,color:C.navy,marginBottom:12}}>{t("finChartTitle")}</div>
        {activeReports.map(r=>{const tot=r.ec+r.furusato+r.wholesale;return(<div key={r.month} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:12,fontWeight:600}}>{r.month}</span><span style={{fontSize:12,fontWeight:700,color:C.navy}}>¥{fmt(tot)}</span></div><div style={{display:"flex",borderRadius:4,overflow:"hidden",height:16,background:"#eee"}}><div style={{width:`${r.ec/maxBar*100}%`,background:C.cyan}}/><div style={{width:`${r.furusato/maxBar*100}%`,background:C.gold}}/><div style={{width:`${r.wholesale/maxBar*100}%`,background:C.green}}/></div></div>);})}
        <div style={{display:"flex",gap:12,marginTop:8,flexWrap:"wrap"}}>{[{l:t("finEc"),c:C.cyan},{l:t("finFurusato"),c:C.gold},{l:t("finWs"),c:C.green}].map(x=>(<div key={x.l} style={{display:"flex",alignItems:"center",gap:5,fontSize:11}}><div style={{width:10,height:10,borderRadius:2,background:x.c}}/><span style={{color:C.sub}}>{x.l}</span></div>))}</div>
      </div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:16,marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:13,color:C.navy,marginBottom:10}}>{t("finBreakTitle")}</div>
        {[{l:t("finEc"),v:bd["EC"]||0,c:C.cyan},{l:t("finFurusato"),v:fnSales,c:C.gold},{l:t("finWsRecorded"),v:wsSales,c:C.green},{l:t("finWsPending"),v:pending,c:C.orange}].map(x=>(<div key={x.l} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:`1px solid ${C.border}`}}><div style={{width:10,height:10,borderRadius:"50%",background:x.c}}/><div style={{flex:1,fontSize:13}}>{x.l}</div><div style={{fontWeight:700,fontSize:14,color:x.c}}>¥{fmt(x.v)}</div></div>))}
        <div style={{display:"flex",justifyContent:"space-between",padding:"12px 0 0",fontWeight:800,fontSize:15}}><span>{t("finTotalConfirmed")}</span><span style={{color:C.navy}}>¥{fmt(total)}</span></div>
      </div>
    </div>
  );
}

// ── 自動取込タブ ──
function ImportTab({orders,setOrders,wholesale,setWholesale,furusatoOrders,setFurusatoOrders,showToast}){
  const [sec,setSec]=useState("csv");
  const [csvText,setCsvText]=useState("");
  const [csvType,setCsvType]=useState("furusato");
  const [preview,setPreview]=useState([]);
  const [importing,setImporting]=useState(false);
  const fileRef=useRef(null);
  const parseCSV=(text)=>{
    const lines=text.trim().split("\n").filter(l=>l.trim());
    if(lines.length<2)return[];
    const headers=lines[0].split(",").map(h=>h.replace(/"/g,"").trim());
    return lines.slice(1).map(line=>{
      const vals=[];let cur="",inQ=false;
      for(let c of line){if(c==='"'){inQ=!inQ;}else if(c===","&&!inQ){vals.push(cur.trim());cur="";}else cur+=c;}
      vals.push(cur.trim());
      const obj={};headers.forEach((h,i)=>obj[h]=vals[i]||"");return obj;
    });
  };
  const handleFile=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{const text=ev.target.result;setCsvText(text);setPreview(parseCSV(text).slice(0,5));};
    reader.readAsText(file,'Shift_JIS');
  };
  const handleImport=async()=>{
    if(!csvText){showToast(t("importErrSelect"),"error");return;}
    setImporting(true);
    try{
      const rows=parseCSV(csvText);
      if(csvType==="furusato"){
        // 筑前町ふるさと納税CSV形式に対応
        const parseDate=s=>{if(!s)return null;const m=String(s).match(/(\d{4})年(\d{2})月(\d{2})日/);return m?`${m[1]}-${m[2]}-${m[3]}`:String(s).slice(0,10)||null;};
        const newFurusato=rows.filter(r=>r["寄附受付No"]&&/^\d+$/.test(String(r["寄附受付No"]).trim())).map(r=>({id:genId("FN"),delivery_no:r["配送No."]||"",donation_receipt_no:r["寄附受付No"]||"",product_name:r["謝礼品"]||"",operator_name:r["事業者"]||"",donor_no:r["寄附者No"]||"",last_name:r["配送　姓"]||"",first_name:r["配送　名"]||"",last_name_kana:r["配送　せい"]||"",first_name_kana:r["配送　めい"]||"",prefecture:r["配送　都道府県"]||"",postal_code:r["配送　郵便番号"]||"",address1:r["配送　住所１"]||"",address2:r["配送　住所２"]||"",phone:r["配送　電話番号"]||"",delivery_status:r["配送ステータス"]||"",tracking_number:r["伝票番号"]||"",carrier:r["配達業者"]||"",memo:r["メモ"]||r["備考"]||"",donation_status:r["寄附ステータス"]||"",donation_year:r["寄附年度"]||"",product_price:Number(String(r["謝礼品価格"]||0).replace(/[,¥￥]/g,"")),product_code:r["謝礼品番号"]||"",gift_type:r["贈答"]||"",donation_amount:Number(String(r["寄附金額"]||0).replace(/[,¥￥]/g,"")),donation_set_amount:Number(String(r["寄附設定金額"]||0).replace(/[,¥￥]/g,"")),shipment_request_date:parseDate(r["出荷依頼日"]),scheduled_shipment_date:parseDate(r["出荷予定日"]),created:nowStr()}));
        let saveErr1=null;
        if(!IS_DEMO){try{await db.upsert("furusato_orders",newFurusato);}catch(e){saveErr1=e.message;}}
        if(!saveErr1&&setFurusatoOrders)setFurusatoOrders(p=>[...newFurusato,...p]);
        if(saveErr1){showToast("Supabase保存エラー: "+saveErr1,"error");}else{showToast(`${newFurusato.length}件のふるさと納税データを取り込みました`);}
        await lineMessage(`📥【花立山養鰻】CSV取込完了\n📅 ${new Date().toLocaleString("ja-JP")}\n\n🏠 ふるさと納税：${newFurusato.length}件を取り込みました${saveErr1?"\n⚠️Supabase保存失敗: "+saveErr1:""}`);
      }else if(csvType==="ec"){
        const newOrders=rows.map((r,i)=>({id:genId("EC"),customer:r["氏名"]||r["顧客名"]||r["注文者名"]||`顧客${i+1}`,type:"EC",product:r["商品名"]||"",qty:Number(r["数量"]||1),amount:Number(String(r["金額"]||0).replace(/[,¥￥]/g,"")),status:"未対応",stock:true,payment:true,assigned:null,shipDate:r["発送予定日"]||"",created:nowStr(),alert:true,memo:r["備考"]||""}));
        setOrders(p=>[...newOrders,...p]);
        let saveErr1=null;
        if(!IS_DEMO){try{await db.upsert("ec_orders",newOrders);}catch(e){saveErr1=e.message;}}
        if(saveErr1){showToast("Supabase保存エラー: "+saveErr1,"error");}else{showToast(`${newOrders.length}件のEC注文を取り込みました`);}
        await lineMessage(`📥【花立山養鰻】CSV取込完了\n📅 ${new Date().toLocaleString("ja-JP")}\n\n🛒 EC注文：${newOrders.length}件を取り込みました${saveErr1?"\n⚠️Supabase保存失敗: "+saveErr1:""}`);
      }else{
        const newWS=rows.map((r,i)=>({id:genId("WS"),client:r["得意先名"]||r["会社名"]||`得意先${i+1}`,tel:r["電話番号"]||"",product:r["商品名"]||"",qty:Number(r["数量"]||1),unitPrice:Number(String(r["単価"]||0).replace(/[,¥￥]/g,"")),amount:Number(String(r["金額"]||r["合計"]||0).replace(/[,¥￥]/g,"")),orderStatus:"受注入力済",purchaseStatus:"未発注",deliveryStatus:"未確定",invoiceIssued:false,salesRecorded:false,shipDate:r["納品予定日"]||"",created:today(),memo:r["備考"]||""}));
        setWholesale(p=>[...newWS,...p]);
        let saveErr2=null;
        if(!IS_DEMO){try{await db.upsert("ws_orders",newWS);}catch(e){saveErr2=e.message;}}
        if(saveErr2){showToast("Supabase保存エラー: "+saveErr2,"error");}else{showToast(`${newWS.length}件の卸注文を取り込みました`);}
        await lineMessage(`📥【花立山養鰻】CSV取込完了\n📅 ${new Date().toLocaleString("ja-JP")}\n\n📦 卸売注文：${newWS.length}件を取り込みました${saveErr2?"\n⚠️Supabase保存失敗: "+saveErr2:""}`);
      }
      setCsvText("");setPreview([]);if(fileRef.current)fileRef.current.value="";
    }catch(e){showToast("取込エラー: "+e.message,"error");}
    setImporting(false);

// ── カレンダータブ ──
function CalendarTab({orders,wholesale,furusatoOrders}){
  const [currentDate,setCurrentDate]=useState(new Date());
  const [selectedDay,setSelectedDay]=useState(null);
  const [selectedEvents,setSelectedEvents]=useState([]);

  const year=currentDate.getFullYear();
  const month=currentDate.getMonth();

  const monthName=new Date(year,month,1).toLocaleDateString("ja-JP",{year:"numeric",month:"long"});

  // 月の最初の日の曜日と日数
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();

  // イベントをまとめる
  const getEvents=(dateStr)=>{
    const evts=[];
    orders.forEach(o=>{
      const ecDate=o.shipDate||(o.created?o.created.slice(0,10).replace(/\//g,"-"):"")||"";
      if(ecDate===dateStr){
        evts.push({type:"ec",label:o.customer,sub:o.product,status:o.status,color:C.cyan});
      }
    });
    wholesale.forEach(w=>{
      if(w.shipDate===dateStr){
        evts.push({type:"ws",label:w.client,sub:w.product,status:w.deliveryStatus,color:C.gold});
      }
    });
    furusatoOrders.forEach(o=>{
      const fnDate=o.scheduledShipDate||o.scheduled_shipment_date||o.shipment_request_date||o.donationDate||"";
      if(fnDate===dateStr){
        const fnName=o.lastName?`${o.lastName} ${o.firstName||""}`.trim():o.last_name?`${o.last_name} ${o.first_name||""}`.trim():o.donorName||"寄附者";
        const fnProduct=o.productName||o.product_name||"";
        evts.push({type:"fn",label:fnName,sub:fnProduct,status:o.deliveryStatus||o.delivery_status||o.status||"配送中",color:"#9C6FD6"});
      }
    });
    return evts;
  };

  const todayStr=today();

  const handleDayClick=(d)=>{
    const dateStr=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const evts=getEvents(dateStr);
    setSelectedDay(dateStr);
    setSelectedEvents(evts);
  };

  const prevMonth=()=>setCurrentDate(new Date(year,month-1,1));
  const nextMonth=()=>setCurrentDate(new Date(year,month+1,1));

  const weeks=[];
  let days=[];
  for(let i=0;i<firstDay;i++)days.push(null);
  for(let d=1;d<=daysInMonth;d++){
    days.push(d);
    if(days.length===7){weeks.push(days);days=[];}
  }
  if(days.length>0){while(days.length<7)days.push(null);weeks.push(days);}

  // 今月の集計
  const monthStr=`${year}-${String(month+1).padStart(2,"0")}`;
  const monthEC=orders.filter(o=>(o.shipDate||o.created?.slice(0,7).replace(/\//g,"-")||"").startsWith(monthStr)).length;
  const monthWS=wholesale.filter(w=>w.shipDate?.startsWith(monthStr)).length;
  const monthFN=furusatoOrders.filter(o=>(o.scheduledShipDate||o.scheduled_shipment_date||o.donationDate||o.shipment_request_date||"").startsWith(monthStr)).length;

  return(
    <div>
      {/* 月次サマリー */}
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        <div style={{background:C.card,border:`1px solid ${C.cyan}44`,borderRadius:8,padding:"8px 10px",flex:1,textAlign:"center"}}>
          <div style={{fontSize:10,color:C.sub}}>{t("calEcLbl")}</div>
          <div style={{fontSize:20,fontWeight:800,color:C.cyan}}>{monthEC}</div>
        </div>
        <div style={{background:C.card,border:`1px solid ${C.gold}44`,borderRadius:8,padding:"8px 10px",flex:1,textAlign:"center"}}>
          <div style={{fontSize:10,color:C.sub}}>{t("calWsLbl")}</div>
          <div style={{fontSize:20,fontWeight:800,color:C.gold}}>{monthWS}</div>
        </div>
        <div style={{background:C.card,border:`1px solid #9C6FD644`,borderRadius:8,padding:"8px 10px",flex:1,textAlign:"center"}}>
          <div style={{fontSize:10,color:C.sub}}>{t("calFnLbl")}</div>
          <div style={{fontSize:20,fontWeight:800,color:"#9C6FD6"}}>{monthFN}</div>
        </div>
      </div>

      {/* カレンダーヘッダー */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",background:C.navy}}>
          <button onClick={prevMonth} style={{background:"none",border:"none",color:"white",fontSize:20,cursor:"pointer",padding:"0 8px"}}>‹</button>
          <div style={{color:"white",fontWeight:700,fontSize:15}}>{monthName}</div>
          <button onClick={nextMonth} style={{background:"none",border:"none",color:"white",fontSize:20,cursor:"pointer",padding:"0 8px"}}>›</button>
        </div>

        {/* 曜日ヘッダー */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:C.navy+"22"}}>
          {(t("calDays")||["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]).map((d,i)=>(
            <div key={d} style={{textAlign:"center",padding:"6px 0",fontSize:11,fontWeight:700,color:i===0?C.red:i===6?"#4488FF":C.sub}}>{d}</div>
          ))}
        </div>

        {/* 日付グリッド */}
        {weeks.map((week,wi)=>(
          <div key={wi} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",borderTop:`1px solid ${C.border}`}}>
            {week.map((d,di)=>{
              if(!d)return <div key={di} style={{minHeight:56,background:C.bg+"88"}}/>;
              const dateStr=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
              const evts=getEvents(dateStr);
              const isToday=dateStr===todayStr;
              const isSelected=dateStr===selectedDay;
              return(
                <div key={di} onClick={()=>handleDayClick(d)} style={{minHeight:56,padding:"3px",borderLeft:di>0?`1px solid ${C.border}`:"none",background:isSelected?C.gold+"22":isToday?C.cyan+"11":"white",cursor:"pointer",position:"relative"}}>
                  <div style={{fontSize:12,fontWeight:isToday?800:400,color:isToday?C.cyan:di===0?C.red:di===6?"#4488FF":C.text,marginBottom:2,width:20,height:20,borderRadius:"50%",background:isToday?C.cyan:"none",color:isToday?"white":di===0?C.red:di===6?"#4488FF":C.text,display:"flex",alignItems:"center",justifyContent:"center"}}>{d}</div>
                  {evts.slice(0,2).map((e,ei)=>(
                    <div key={ei} style={{fontSize:9,background:e.color+"22",color:e.color,borderRadius:2,padding:"1px 3px",marginBottom:1,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",fontWeight:600}}>{e.label}</div>
                  ))}
                  {evts.length>2&&<div style={{fontSize:9,color:C.sub}}>+{evts.length-2}</div>}
                </div>
              );
            })}
          </div>
        ))}
      </div>

      {/* 凡例 */}
      <div style={{display:"flex",gap:12,marginTop:10,flexWrap:"wrap"}}>
        {[{color:C.cyan,label:t("calLegendEc")},{color:C.gold,label:t("calLegendWs")},{color:"#9C6FD6",label:t("calLegendFn")}].map((l,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:C.sub}}>
            <div style={{width:10,height:10,borderRadius:2,background:l.color}}/>
            {l.label}
          </div>
        ))}
      </div>

      {/* 選択日の詳細 */}
      {selectedDay&&(
        <div style={{marginTop:12,background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
          <div style={{fontWeight:700,fontSize:13,color:C.navy,marginBottom:10}}>
            📅 {new Date(selectedDay+"T00:00:00").toLocaleDateString("ja-JP",{month:"long",day:"numeric",weekday:"short"})}の予定
          </div>
          {selectedEvents.length===0?(
            <div style={{fontSize:13,color:C.sub,textAlign:"center",padding:"12px 0"}}>{t("calNoSchedule")}</div>
          ):(
            selectedEvents.map((e,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
                <div style={{width:4,height:36,borderRadius:2,background:e.color,flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:13,color:C.text}}>{e.label}</div>
                  <div style={{fontSize:11,color:C.sub}}>{e.sub}</div>
                </div>
                <div style={{fontSize:11,background:e.color+"22",color:e.color,padding:"3px 8px",borderRadius:10,fontWeight:600}}>{e.status||"未対応"}</div>
              </div>
            ))
          )}
        </div>
      )}
    </div>
  );
}

export default async function handler(req, res) {
  if (req.method !== 'POST') return res.status(405).end();
  const { message } = req.body;
  const response = await fetch('https://api.line.me/v2/bot/message/push', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + process.env.LINE_TOKEN,
    },
    body: JSON.stringify({
      to: process.env.LINE_GROUP_ID,
      messages: [{ type: 'text', text: message }],
    }),
  });
  const data = await response.json();
  res.json({ ok: response.ok, data });
}`},

}

const AUTO_NOTIFY={MORNING_HOUR:8,ALERT_INTERVAL_MS:60*60*1000,LOW_STOCK:3};

// ══════════════════════════════
//  メインアプリ
// ══════════════════════════════
function App(){
  const [loggedIn,setLoggedIn]=useState(false);
  const [activeTab,setActiveTab]=useState("ec");
  const [orders,setOrders]=useState(D_ORDERS);
  const [wholesale,setWholesale]=useState(D_WS);
  const [products,setProducts]=useState(D_PRODUCTS);
  const [clients,setClients]=useState(D_CLIENTS);
  const [staff,setStaff]=useState([]);
  const [diary,setDiary]=useState(D_DIARY);
  const [inventory,setInventory]=useState(D_INVENTORY);
  const [furusatoOrders,setFurusatoOrders]=useState([]);
  const [toast,setToast]=useState(null);
  const [lineSending,setLineSending]=useState(false);
  const [notifyLog,setNotifyLog]=useState([]);
  const [autoNotifyEnabled,setAutoNotifyEnabled]=useState(true);
  const [langTick,setLangTick]=useState(0);
  const [langTick,setLangTick]=useState(0);
  const ordersRef=useRef(orders);
  const wholesaleRef=useRef(wholesale);
  const productsRef=useRef(products);
  const lastMorningRef=useRef(null);
  const lastAlertRef=useRef(null);
  useEffect(()=>{ordersRef.current=orders;},[orders]);
  useEffect(()=>{wholesaleRef.current=wholesale;},[wholesale]);
  useEffect(()=>{productsRef.current=products;},[products]);
  const showToast=useCallback((msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3000);},[]);
  const addLog=useCallback((type,msg)=>{setNotifyLog(p=>[{id:genId("LOG"),time:new Date().toLocaleString("ja-JP"),type,msg},...p].slice(0,50));},[]);

  // ── 自動通知ロジック ──
  const sendMorningReport=useCallback(async()=>{
    const ords=ordersRef.current,ws=wholesaleRef.current,prods=productsRef.current;
    const todayShip=ords.filter(o=>o.shipDate===today()&&!["発送済み","完了"].includes(o.status));
    const wsShip=ws.filter(w=>w.shipDate===today()&&w.deliveryStatus!=="仕入確定");
    const unhandled=ords.filter(o=>o.alert);
    const lowStock=prods.filter(p=>p.stock<=AUTO_NOTIFY.LOW_STOCK&&p.stock>=0);
    const lines=["🌅【花立山養鰻】おはようございます",`📅 ${new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric",weekday:"short"})}`,"",
      `📦 本日の発送予定：${todayShip.length}件`,...todayShip.map(o=>`　・${o.customer}（${o.product}）`),todayShip.length===0?"　なし":"",
      `🏢 本日の納品予定：${wsShip.length}件`,...wsShip.map(w=>`　・${w.client}（${w.product}）`),wsShip.length===0?"　なし":"",
      `⚠️ 要対応：${unhandled.length}件`,unhandled.length>0?`　${unhandled.slice(0,3).map(o=>o.customer).join("、")}${unhandled.length>3?"...":""}`:""," ",
      lowStock.length>0?`🔴 在庫注意：${lowStock.map(p=>`${p.name}（残${p.stock}個）`).join("、")}`:""
    ].filter(l=>l!==undefined);
    await lineMessage(lines.join("\n"));
    addLog("朝次レポート",`発送${todayShip.length}件・要対応${unhandled.length}件`);
    showToast(IS_DEMO?"📲 朝の日次レポート（デモ・コンソール確認）":"📲 朝の日次レポートを送信しました");
  },[addLog,showToast]);

  const sendAlertNotify=useCallback(async(reason)=>{
    const ords=ordersRef.current,ws=wholesaleRef.current;
    const ecA=ords.filter(o=>o.alert);
    const wsA=ws.filter(w=>!w.salesRecorded||!w.invoiceIssued||w.purchaseStatus==="未発注");
    if(ecA.length===0&&wsA.length===0)return;
    const lines=[`⚠️【花立山養鰻】${reason}`,`📅 ${new Date().toLocaleString("ja-JP")}`];
    if(ecA.length){lines.push("\n🛒 EC・ふるさと納税");ecA.forEach(o=>{const issues=[!o.stock&&"在庫なし",!o.payment&&"決済未確認",o.status==="未対応"&&"未対応",!o.assigned&&"担当未割当"].filter(Boolean);lines.push(`　${o.id} ${o.customer}：${issues.join("・")}`);});}
    if(wsA.length){lines.push("\n📦 卸先管理");wsA.forEach(w=>{const issues=[w.purchaseStatus==="未発注"&&"発注未完了",!w.invoiceIssued&&"納品書未発行",!w.salesRecorded&&"売上未計上"].filter(Boolean);lines.push(`　${w.id} ${w.client}：${issues.join("・")}`);});}
    await lineMessage(lines.join("\n"));
    addLog("アラート通知",`EC${ecA.length}件・卸先${wsA.length}件`);
  },[addLog]);

  const sendStockAlert=useCallback(async(lowProds)=>{
    const lines=["🔴【花立山養鰻】在庫アラート",`📅 ${new Date().toLocaleString("ja-JP")}`,"",...lowProds.map(p=>p.stock===0?`⛔ 欠品：${p.name}（在庫0個）`:`⚠️ 残りわずか：${p.name}（残${p.stock}個）`)];
    await lineMessage(lines.join("\n"));
    addLog("在庫アラート",lowProds.map(p=>p.name).join("、"));
  },[addLog]);

  // ── 自動通知スケジューラー ──
  useEffect(()=>{
    if(!loggedIn||!autoNotifyEnabled)return;
    const tick=async()=>{
      const now=new Date();
      const h=now.getHours(),min=now.getMinutes(),dateKey=now.toDateString();
      if(h===CONFIG.MORNING_HOUR&&min<5&&lastMorningRef.current!==dateKey){lastMorningRef.current=dateKey;await sendMorningReport();}
      const nowMs=now.getTime();
      if(!lastAlertRef.current||nowMs-lastAlertRef.current>CONFIG.ALERT_INTERVAL_MIN*60*1000){
        lastAlertRef.current=nowMs;
        await sendAlertNotify("定期アラートチェック");
        const lowProds=productsRef.current.filter(p=>p.stock<=CONFIG.LOW_STOCK_THRESHOLD);
        if(lowProds.length>0)await sendStockAlert(lowProds);
      }
    };
    tick();
    const timer=setInterval(tick,5*60*1000);
    return()=>clearInterval(timer);
  },[loggedIn,autoNotifyEnabled,sendMorningReport,sendAlertNotify,sendStockAlert]);

  // 在庫変化監視
  useEffect(()=>{
    if(!loggedIn||!autoNotifyEnabled)return;
    const outOfStock=products.filter(p=>p.stock===0);
    if(outOfStock.length>0)outOfStock.forEach(p=>console.log(`[在庫アラート] ${p.name} が欠品しました`));
  },[products,loggedIn,autoNotifyEnabled]);

  // Supabase初期ロード
  useEffect(()=>{
    if(IS_DEMO||!loggedIn)return;
    (async()=>{
      try{
        const [ec,ws,pr,cl,st,di,inv,fn]=await Promise.all([db.select("ec_orders"),db.select("ws_orders"),db.select("products"),db.select("clients"),db.select("staff"),db.select("diary"),db.select("inventory"),db.select("furusato_orders")]);
        if(ec?.length)setOrders(ec);if(ws?.length)setWholesale(ws);if(pr?.length)setProducts(pr);
        if(cl?.length)setClients(cl);if(st?.length)setStaff(st.map(s=>s.name));if(di?.length)setDiary(di);if(inv?.length)setInventory(inv);
        if(fn?.length)setFurusatoOrders(fn);
        showToast(t("saved"));
      }catch(e){showToast(t("errInput"),"error");}
    })();
  },[loggedIn]);

  const handleSave=useCallback(async(table,data)=>{if(IS_DEMO){showToast("保存しました（デモ）");return;}try{const arr=Array.isArray(data)?data:[data];await db.upsert(table,arr);}catch(e){console.log("保存エラー",e,table,data);showToast("保存エラー","error");}},[showToast]);
  const handleDel=useCallback(async(table,col,val)=>{if(IS_DEMO)return;try{await db.del(table,col,val);}catch(e){showToast("削除エラー","error");}},[showToast]);

  const handleLine=useCallback(async()=>{
    setLineSending(true);
    const ecA=orders.filter(o=>o.alert);
    const wsA=wholesale.filter(w=>!w.salesRecorded||!w.invoiceIssued||w.purchaseStatus==="未発注");
    const lines=["⚠️【花立山養鰻】要対応アラート",`📅 ${new Date().toLocaleString("ja-JP")}`];
    if(ecA.length){lines.push("\n🛒 EC・ふるさと納税");ecA.forEach(o=>{const issues=[!o.stock&&"在庫なし",!o.payment&&"決済未確認",o.status==="未対応"&&"未対応",!o.assigned&&"担当未割当"].filter(Boolean);lines.push(`　${o.id} ${o.customer}：${issues.join("・")}`);});}
    if(wsA.length){lines.push("\n📦 卸先管理");wsA.forEach(w=>lines.push(`　${w.id} ${w.client}`));}
    await lineMessage(lines.join("\n"));
    addLog("手動通知",`EC${ecA.length}件・卸先${wsA.length}件`);
    showToast(t("alertSendLine"));
    setLineSending(false);
  },[orders,wholesale,showToast,addLog]);

  const handleExport=useCallback((key)=>{
    if(key==="all"){["ec","ws","products","clients","diary","inventory"].forEach((k,i)=>setTimeout(()=>handleExport(k),i*300));return;}
    const map={ec:orders,ws:wholesale,products,clients,diary,inventory};
    const names={ec:"EC注文",ws:"卸先注文",products:"商品マスタ",clients:"得意先マスタ",diary:"日報",inventory:"在庫履歴"};
    const d=map[key];if(!d||!d.length){showToast("データがありません","error");return;}
    exportCSV(d,names[key]);showToast(`${names[key]}をダウンロードしました`);
  },[orders,wholesale,products,clients,diary,inventory,showToast]);

  const alertCount=orders.filter(o=>o.alert).length+wholesale.filter(w=>!w.salesRecorded||!w.invoiceIssued||w.purchaseStatus==="未発注").length;
  if(!loggedIn)return <LoginScreen onLogin={()=>setLoggedIn(true)}/>;

  return(
    <div style={{fontFamily:"'Helvetica Neue',Arial,'Hiragino Sans',sans-serif",background:C.bg,minHeight:"100vh",maxWidth:600,margin:"0 auto"}}>
      <div style={{background:C.navy,padding:"14px 18px 0",position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <div><div style={{color:"white",fontWeight:800,fontSize:15}}>{t("appName")}</div><div style={{color:C.goldL,fontSize:10,opacity:0.85}}>業務管理システム {IS_DEMO?t("demoMode"):t("liveMode")}</div></div>
          <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
            {alertCount>0&&<div style={{background:C.red,color:"white",borderRadius:20,padding:"4px 10px",fontSize:12,fontWeight:800}}>⚠️ {alertCount}件</div>}
            <button onClick={()=>{setLang(currentLang==="ja"?"en":"ja");setLangTick(p=>p+1);}} style={{background:"none",border:`1px solid rgba(255,255,255,0.3)`,color:"rgba(255,255,255,0.9)",borderRadius:6,padding:"4px 8px",fontSize:11,cursor:"pointer",fontWeight:700}}>{currentLang==="ja"?"🇬🇧 EN":"🇯🇵 JA"}</button>
            <button onClick={()=>setLoggedIn(false)} style={{background:"none",border:`1px solid rgba(255,255,255,0.3)`,color:"rgba(255,255,255,0.7)",borderRadius:6,padding:"4px 8px",fontSize:11,cursor:"pointer"}}>{t("logout")}</button>
          </div>
        </div>
        <div style={{display:"flex",overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
          {TABS.map(t=>(<button key={t.id} onClick={()=>setActiveTab(t.id)} style={{flex:"0 0 auto",padding:"10px 12px 11px",border:"none",background:"none",color:activeTab===t.id?C.goldL:"rgba(255,255,255,0.4)",borderBottom:`2px solid ${activeTab===t.id?C.goldL:"transparent"}`,fontSize:12,cursor:"pointer",fontWeight:activeTab===t.id?700:400,display:"flex",flexDirection:"column",alignItems:"center",gap:2,minWidth:50}}><span style={{fontSize:15}}>{t.icon}</span><span style={{whiteSpace:"nowrap"}}>{t.label}{t.id==="alert"&&alertCount>0?` (${alertCount})`:""}</span></button>))}
        </div>
      </div>
      <div style={{padding:"16px 16px 80px"}}>
        {activeTab==="ec"&&<EcTab orders={orders} setOrders={setOrders} furusatoOrders={furusatoOrders} staff={staff} products={products} showToast={showToast} onSave={handleSave} onDel={handleDel}/>}
        {activeTab==="wholesale"&&<WholesaleTab wholesale={wholesale} setWholesale={setWholesale} products={products} clients={clients} showToast={showToast} onSave={handleSave} onDel={handleDel}/>}
        {activeTab==="alert"&&<AlertTab orders={orders} wholesale={wholesale} onLine={handleLine} lineSending={lineSending} autoNotifyEnabled={autoNotifyEnabled} setAutoNotifyEnabled={setAutoNotifyEnabled} notifyLog={notifyLog} onMorning={sendMorningReport}/>}
        {activeTab==="inventory"&&<InventoryTab products={products} setProducts={setProducts} inventory={inventory} setInventory={setInventory} showToast={showToast}/>}
        {activeTab==="finance"&&<FinanceTab orders={orders} wholesale={wholesale} furusatoOrders={furusatoOrders} reports={D_REPORTS} onExport={handleExport}/>}
        {activeTab==="diary"&&<DiaryTab diary={diary} setDiary={setDiary} staff={staff} showToast={showToast} onDel={handleDel} onSave={handleSave}/>}
        {activeTab==="calendar"&&<CalendarTab orders={orders} wholesale={wholesale} furusatoOrders={furusatoOrders}/>}
        {activeTab==="furusato"&&<FurusatoTab furusatoOrders={furusatoOrders} setFurusatoOrders={setFurusatoOrders} showToast={showToast} onDel={handleDel}/>}
        {activeTab==="import"&&<ImportTab orders={orders} setOrders={setOrders} wholesale={wholesale} setWholesale={setWholesale} furusatoOrders={furusatoOrders} setFurusatoOrders={setFurusatoOrders} showToast={showToast}/>}
        {activeTab==="setup"&&<SetupTab staff={staff} setStaff={setStaff} products={products} setProducts={setProducts} clients={clients} setClients={setClients} showToast={showToast} onExportAll={handleExport}/>}
      </div>
      <Toast msg={toast?.msg} type={toast?.type}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
