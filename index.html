// ── Supabaseクライアント ──
const toSnake=s=>s.replace(/[A-Z]/g,m=>"_"+m.toLowerCase());
const toCamel=s=>s.replace(/_([a-z])/g,(_,c)=>c.toUpperCase());
const keysToSnake=o=>{if(Array.isArray(o))return o.map(keysToSnake);if(o&&typeof o==="object"){const r={};for(const k in o)r[toSnake(k)]=o[k];return r;}return o;};
const keysToCamel=o=>{if(Array.isArray(o))return o.map(keysToCamel);if(o&&typeof o==="object"){const r={};for(const k in o)r[toCamel(k)]=o[k];return r;}return o;};
class SB{
  constructor(u,k){this.u=u;this.k=k;}
  h(){return{"apikey":this.k,"Authorization":"Bearer "+this.k,"Content-Type":"application/json","Prefer":"return=representation"};}
  async select(t){const r=await fetch(`${this.u}/rest/v1/${t}?select=*`,{headers:this.h()});if(!r.ok)throw new Error(await r.text());return keysToCamel(await r.json());}
  async upsert(t,d){const r=await fetch(`${this.u}/rest/v1/${t}`,{method:"POST",headers:{...this.h(),"Prefer":"resolution=merge-duplicates,return=representation"},body:JSON.stringify(keysToSnake(Array.isArray(d)?d:[d]))});if(!r.ok)throw new Error(await r.text());return keysToCamel(await r.json());}
  async del(t,col,val){const r=await fetch(`${this.u}/rest/v1/${t}?${toSnake(col)}=eq.${encodeURIComponent(val)}`,{method:"DELETE",headers:this.h()});if(!r.ok)throw new Error(await r.text());}
}

async function lineMessage(msg){
  if(IS_DEMO){console.log("[LINE Messaging API デモ]\n"+msg);return;}
  try{
    const res=await fetch("/api/line-message",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:msg}),
    });
    const data=await res.json();
    if(!res.ok||!data.ok){console.error("LINE通知失敗:",data);}
    else{console.log("LINE通知成功:",data);}
  }catch(e){console.error("LINE通知エラー:",e);}
}

// ── CSV出力 ──
function exportCSV(data,name){
  if(!data||!data.length)return;
  const keys=Object.keys(data[0]);
  const rows=[keys.join(","),...data.map(r=>keys.map(k=>`"${String(r[k]??'').replace(/"/g,'""')}"`).join(","))];
  const csv="\uFEFF"+rows.join("\n");
  const filename=`花立山養鰻_${name}_${new Date().toISOString().slice(0,10)}.csv`;
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  const a=document.createElement("a");
  if(isIOS){
    a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
  } else {
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
    a.href=URL.createObjectURL(blob);
    setTimeout(()=>URL.revokeObjectURL(a.href),2000);
  }
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

          <div style={{marginTop:6}}><Inp value={form.product} onChange={v=>setForm(f=>({...f,product:v}))} placeholder="または直接入力"/></div>

          <Lbl t="発送予定日"/><Inp type="date" value={form.shipDate} onChange={v=>setForm(f=>({...f,shipDate:v}))}/>
          <Lbl t="メモ"/><Inp value={form.memo} onChange={v=>setForm(f=>({...f,memo:v}))} placeholder="備考"/>

              <Lbl t="ステータス変更"/>

              <Lbl t="発送予定日"/>
              <Inp type="date" value={detail.shipDate||""} onChange={v=>{upd(detail.id,"shipDate",v);setDetail(p=>({...p,shipDate:v}));}}/>
              <Lbl t="担当者を割り当てる"/>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {staff.length===0&&<div style={{fontSize:12,color:C.sub}}>⚙️設定タブで担当者を追加してください</div>}
                {staff.map(s=>(<button key={s} onClick={()=>{upd(detail.id,"assigned",s);setDetail(p=>({...p,assigned:s}));}} style={{padding:"9px 14px",borderRadius:6,border:`1px solid ${detail.assigned===s?C.navy:C.border}`,background:detail.assigned===s?C.navy:"white",color:detail.assigned===s?"white":C.text,fontSize:13,cursor:"pointer",fontWeight:700}}>{s}</button>))}
              </div>
              <div style={{display:"flex",gap:10,marginTop:10}}><Toggle label="在庫あり" checked={detail.stock} onChange={v=>{upd(detail.id,"stock",v);setDetail(p=>({...p,stock:v}));}}/><Toggle label="決済OK" checked={detail.payment} onChange={v=>{upd(detail.id,"payment",v);setDetail(p=>({...p,payment:v}));}}/></div>
              <div style={{display:"flex",gap:8,marginTop:14}}><SmallBtn onClick={()=>setEditMode(true)} label="✏️ 内容を編集" color={C.gold} bg={C.goldBg}/><SmallBtn onClick={()=>doDelete(detail.id)} label="🗑️ 削除" color={C.red} bg={C.red+"11"}/></div>
              <PrimaryBtn onClick={async()=>{await onSave("ec_orders",detail);showToast("保存しました");setDetail(null);}} label="💾 保存"/>
            </>
          ):(
            <>
              <Lbl t="顧客名"/><Inp value={detail.customer} onChange={v=>setDetail(p=>({...p,customer:v}))}/>
              <Lbl t="商品名"/><Inp value={detail.product} onChange={v=>setDetail(p=>({...p,product:v}))}/>
              <Lbl t="数量"/><Inp type="number" value={detail.qty} onChange={v=>setDetail(p=>({...p,qty:Number(v)}))}/>
              <Lbl t="金額（円）"/><Inp type="number" value={detail.amount} onChange={v=>setDetail(p=>({...p,amount:Number(v)}))}/>
              <Lbl t="発送予定日"/><Inp type="date" value={detail.shipDate||""} onChange={v=>setDetail(p=>({...p,shipDate:v}))}/>
              <Lbl t="メモ"/><Inp value={detail.memo||""} onChange={v=>setDetail(p=>({...p,memo:v}))} placeholder="備考"/>
              <div style={{display:"flex",gap:8,marginTop:14}}>
                <button onClick={()=>setEditMode(false)} style={{flex:1,padding:"12px 0",borderRadius:8,border:`1px solid ${C.border}`,background:"white",fontSize:13,cursor:"pointer",fontWeight:600}}>← 戻る</button>
                <button onClick={()=>{setOrders(p=>p.map(o=>o.id===detail.id?{...detail,alert:!detail.stock||!detail.payment||detail.status==="未対応"}:o));setEditMode(false);showToast("編集しました");}} style={{flex:1,padding:"12px 0",borderRadius:8,background:C.navy,color:"white",fontWeight:700,fontSize:13,border:"none",cursor:"pointer"}}>✓ 変更を保存</button>
              </div>
            </>
          )}
        </Modal>
      )}
      {confirm&&<Confirm msg={confirm.msg} onOk={confirm.onOk} onCancel={()=>setConfirm(null)}/>}
    </div>
  );
}

// ── 卸先タブ ──
function WholesaleTab({wholesale,setWholesale,products,clients,showToast,onSave,onDel}){
  const [detail,setDetail]=useState(null);
  const [showNew,setShowNew]=useState(false);
  const [editMode,setEditMode]=useState(false);
  const [confirm,setConfirm]=useState(null);
  const [form,setForm]=useState({client:"",tel:"",product:"",qty:1,unitPrice:0,shipDate:"",memo:""});
  const upd=(id,f,v)=>{setWholesale(p=>p.map(w=>w.id===id?{...w,[f]:v}:w));setDetail(p=>p&&p.id===id?{...p,[f]:v}:p);};
  const selClient=n=>{const c=clients.find(c=>c.name===n);if(c)setForm(f=>({...f,client:c.name,tel:c.tel}));else setForm(f=>({...f,client:n}));};
  const selProd=n=>{const p=products.find(p=>p.name===n);if(p)setForm(f=>({...f,product:p.name,unitPrice:p.price}));else setForm(f=>({...f,product:n}));};
  const addWS=()=>{
    if(!form.client||!form.product){showToast("得意先と商品を入力してください","error");return;}
    const w={id:genId("WS"),client:form.client,tel:form.tel,product:form.product,qty:Number(form.qty),unitPrice:Number(form.unitPrice),amount:Number(form.qty)*Number(form.unitPrice),orderStatus:"受注入力済",purchaseStatus:"未発注",deliveryStatus:"未確定",invoiceIssued:false,salesRecorded:false,shipDate:form.shipDate,created:today(),memo:form.memo};
    setWholesale(p=>[w,...p]);setShowNew(false);
    setForm({client:"",tel:"",product:"",qty:1,unitPrice:0,shipDate:"",memo:""});
    showToast("卸先注文を追加しました");
  };
  const doDelete=id=>{setConfirm({msg:"この卸先注文を削除しますか？\n削除後は元に戻せません。",onOk:async()=>{setWholesale(p=>p.filter(w=>w.id!==id));await onDel("ws_orders","id",id);setDetail(null);setConfirm(null);showToast("削除しました");}});};
  const FS=({label,opts,value,onChange})=>(<div style={{marginTop:10}}><div style={{fontSize:11,color:C.sub,marginBottom:5}}>{label}</div><div style={{display:"flex",gap:6}}>{opts.map(o=><button key={o} onClick={()=>onChange(o)} style={{flex:1,padding:"9px 0",borderRadius:6,border:`1px solid ${value===o?sc(o):C.border}`,background:value===o?sc(o):"white",color:value===o?"white":C.text,fontSize:12,cursor:"pointer",fontWeight:700}}>{o}</button>)}</div></div>);
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:14}}>
        <SummaryCard label="計上済み売上" value={`¥${fmt(wholesale.reduce((s,w)=>w.salesRecorded?s+w.amount:s,0))}`} color={C.green}/>
        <SummaryCard label="未計上件数" value={wholesale.filter(w=>!w.salesRecorded).length} color={C.orange}/>
      </div>
      <button onClick={()=>setShowNew(true)} style={{width:"100%",padding:"12px 0",borderRadius:10,background:C.gold,color:"white",fontWeight:800,fontSize:14,border:"none",cursor:"pointer",marginBottom:12,boxShadow:"0 2px 8px #C8963E44"}}>＋ 新規卸注文を追加</button>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {wholesale.map(w=>(
          <div key={w.id} onClick={()=>{setDetail({...w});setEditMode(false);}} style={{background:C.card,border:`1px solid ${C.border}`,borderLeft:`4px solid ${w.salesRecorded?C.green:C.orange}`,borderRadius:8,padding:"12px 14px",cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:13}}>{w.client}</div>
                <div style={{fontSize:12,color:C.sub,marginTop:3}}>{w.product} × {w.qty}</div>
                <div style={{display:"flex",gap:5,marginTop:6,flexWrap:"wrap"}}>
                  <Badge label={`受注:${w.orderStatus}`} color={sc(w.orderStatus)}/><Badge label={`発注:${w.purchaseStatus}`} color={sc(w.purchaseStatus)}/><Badge label={`仕入:${w.deliveryStatus}`} color={sc(w.deliveryStatus)}/>
                </div>
                {w.shipDate&&<div style={{fontSize:11,color:C.sub,marginTop:4}}>納品予定:{w.shipDate}</div>}
                {w.memo&&<div style={{fontSize:11,color:C.orange,marginTop:2}}>📝 {w.memo}</div>}
              </div>
              <div style={{textAlign:"right"}}><div style={{fontWeight:800,color:C.navy,fontSize:14}}>¥{fmt(w.amount)}</div><div style={{fontSize:11,color:C.sub}}>{w.created}</div></div>
            </div>
            <div style={{display:"flex",gap:6,marginTop:8}}><Badge label={w.invoiceIssued?"✓ 納品書":"納品書未発行"} color={w.invoiceIssued?C.green:C.red}/><Badge label={w.salesRecorded?"✓ 売上計上":"売上未計上"} color={w.salesRecorded?C.green:C.orange}/></div>
          </div>
        ))}
      </div>
      {showNew&&(
        <Modal onClose={()=>setShowNew(false)} title="＋ 新規卸注文">
          <Lbl t="得意先"/>
          <Sel value="" onChange={e=>selClient(e.target.value)}><option value="">── 登録得意先から選択 ──</option>{clients.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}</Sel>
          <div style={{marginTop:6}}><Inp value={form.client} onChange={v=>setForm(f=>({...f,client:v}))} placeholder="または直接入力"/></div>
          <Lbl t="電話番号"/><Inp value={form.tel} onChange={v=>setForm(f=>({...f,tel:v}))} placeholder="例：092-123-4567"/>
          <Lbl t="商品"/>
          <Sel value="" onChange={e=>selProd(e.target.value)}><option value="">── 登録商品から選択 ──</option>{products.filter(p=>p.category==="卸売").map(p=><option key={p.id} value={p.name}>{p.name}（¥{fmt(p.price)}）</option>)}</Sel>
          <div style={{marginTop:6}}><Inp value={form.product} onChange={v=>setForm(f=>({...f,product:v}))} placeholder="または直接入力"/></div>
          <Lbl t="数量"/><Inp type="number" value={form.qty} onChange={v=>setForm(f=>({...f,qty:v}))} placeholder="1"/>
          <Lbl t="単価（円）"/><Inp type="number" value={form.unitPrice} onChange={v=>setForm(f=>({...f,unitPrice:v}))} placeholder="0"/>
          <div style={{padding:"8px 12px",background:C.gold+"11",borderRadius:6,marginTop:6,fontWeight:700,color:C.navy}}>合計：¥{fmt(Number(form.qty)*Number(form.unitPrice))}</div>
          <Lbl t="納品予定日"/><Inp type="date" value={form.shipDate} onChange={v=>setForm(f=>({...f,shipDate:v}))}/>
          <Lbl t="メモ"/><Inp value={form.memo} onChange={v=>setForm(f=>({...f,memo:v}))} placeholder="備考"/>
          <PrimaryBtn onClick={addWS} label="＋ 卸注文を追加" color={C.gold}/>
        </Modal>
      )}
      {detail&&(
        <Modal onClose={()=>setDetail(null)} title={editMode?`✏️ 編集 ${detail.id}`:`卸先詳細 ${detail.id}`}>
          {!editMode?(
            <>
              <Row label="得意先" value={detail.client}/><Row label="電話" value={detail.tel||"—"}/><Row label="商品" value={detail.product}/><Row label="数量" value={`${detail.qty}個`}/><Row label="単価" value={`¥${fmt(detail.unitPrice)}`}/><Row label="合計" value={`¥${fmt(detail.amount)}`}/><Row label="受注日" value={detail.created}/><Row label="メモ" value={detail.memo||"—"}/>
              <Lbl t="納品予定日"/><Inp type="date" value={detail.shipDate||""} onChange={v=>{upd(detail.id,"shipDate",v);setDetail(p=>({...p,shipDate:v}));}}/>
              <FS label="受注管理" opts={ST_WS_O} value={detail.orderStatus} onChange={v=>upd(detail.id,"orderStatus",v)}/>
              <FS label="発注管理" opts={ST_WS_P} value={detail.purchaseStatus} onChange={v=>upd(detail.id,"purchaseStatus",v)}/>
              <FS label="仕入管理" opts={ST_WS_D} value={detail.deliveryStatus} onChange={v=>upd(detail.id,"deliveryStatus",v)}/>
              <div style={{display:"flex",gap:10,marginTop:10}}><Toggle label="納品書発行" checked={detail.invoiceIssued} onChange={v=>upd(detail.id,"invoiceIssued",v)}/><Toggle label="売上計上" checked={detail.salesRecorded} onChange={v=>upd(detail.id,"salesRecorded",v)}/></div>
              <div style={{display:"flex",gap:8,marginTop:14}}><SmallBtn onClick={()=>setEditMode(true)} label="✏️ 内容を編集" color={C.gold} bg={C.goldBg}/><SmallBtn onClick={()=>doDelete(detail.id)} label="🗑️ 削除" color={C.red} bg={C.red+"11"}/></div>
              <PrimaryBtn onClick={async()=>{await onSave("ws_orders",detail);showToast("保存しました");setDetail(null);}} label="💾 保存"/>
            </>
          ):(
            <>
              <Lbl t="得意先名"/><Inp value={detail.client} onChange={v=>setDetail(p=>({...p,client:v}))}/>
              <Lbl t="電話番号"/><Inp value={detail.tel||""} onChange={v=>setDetail(p=>({...p,tel:v}))}/>
              <Lbl t="商品名"/><Inp value={detail.product} onChange={v=>setDetail(p=>({...p,product:v}))}/>
              <Lbl t="数量"/><Inp type="number" value={detail.qty} onChange={v=>setDetail(p=>({...p,qty:Number(v),amount:Number(v)*p.unitPrice}))}/>
              <Lbl t="単価（円）"/><Inp type="number" value={detail.unitPrice} onChange={v=>setDetail(p=>({...p,unitPrice:Number(v),amount:p.qty*Number(v)}))}/>
              <Lbl t="メモ"/><Inp value={detail.memo||""} onChange={v=>setDetail(p=>({...p,memo:v}))} placeholder="備考"/>
              <div style={{display:"flex",gap:8,marginTop:14}}>
                <button onClick={()=>setEditMode(false)} style={{flex:1,padding:"12px 0",borderRadius:8,border:`1px solid ${C.border}`,background:"white",fontSize:13,cursor:"pointer",fontWeight:600}}>← 戻る</button>
                <button onClick={()=>{setWholesale(p=>p.map(w=>w.id===detail.id?{...detail}:w));setEditMode(false);showToast("編集しました");}} style={{flex:1,padding:"12px 0",borderRadius:8,background:C.navy,color:"white",fontWeight:700,fontSize:13,border:"none",cursor:"pointer"}}>✓ 変更を保存</button>
              </div>
            </>
          )}
        </Modal>
      )}
      {confirm&&<Confirm msg={confirm.msg} onOk={confirm.onOk} onCancel={()=>setConfirm(null)}/>}
    </div>
  );
}

// ── アラートタブ ──
function AlertTab({orders,wholesale,onLine,lineSending,autoNotifyEnabled,setAutoNotifyEnabled,notifyLog,onMorning}){
  const ecA=orders.filter(o=>o.alert);
  const wsA=wholesale.filter(w=>!w.salesRecorded||!w.invoiceIssued||w.purchaseStatus==="未発注");
  const shipA=[
    ...orders.filter(o=>o.shipDate===today()&&!["発送済み","完了"].includes(o.status)).map(o=>({label:`EC: ${o.customer}`,sub:"発送予定日が本日です",color:C.cyan})),
    ...wholesale.filter(w=>w.shipDate===today()&&w.deliveryStatus!=="仕入確定").map(w=>({label:`卸: ${w.client}`,sub:"納品予定日が本日です",color:C.gold})),
  ];
  const total=ecA.length+wsA.length+shipA.length;
  const Card=({title,sub,issues,color=C.red})=>(<div style={{background:C.card,border:`1px solid ${color}44`,borderLeft:`4px solid ${color}`,borderRadius:8,padding:"10px 14px",marginBottom:8}}><div style={{fontWeight:700,fontSize:13}}>{title}</div>{sub&&<div style={{fontSize:11,color:C.sub,marginBottom:5}}>{sub}</div>}{issues&&issues.map((i,idx)=><div key={idx} style={{fontSize:12,color}}>{i}</div>)}</div>);
  return(
    <div>
      <div style={{background:total>0?C.red+"11":C.green+"11",border:`1px solid ${total>0?C.red:C.green}44`,borderRadius:10,padding:"14px 16px",marginBottom:12,display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:24}}>{total>0?"⚠️":"✅"}</span>
        <div style={{flex:1}}><div style={{fontWeight:700,color:total>0?C.red:C.green,fontSize:15}}>{total>0?`要対応 ${total}件`:"全て対応済みです"}</div><div style={{fontSize:12,color:C.sub}}>複数名で確認してください</div></div>
        <button onClick={onLine} disabled={lineSending} style={{padding:"9px 14px",borderRadius:8,background:lineSending?C.border:C.lineGreen,color:"white",fontWeight:700,fontSize:13,border:"none",cursor:"pointer",whiteSpace:"nowrap"}}>{lineSending?"送信中...":"📲 LINE通知"}</button>}
      </div>
      {IS_DEMO&&<div style={{background:C.gold+"22",border:`1px solid ${C.gold}55`,borderRadius:8,padding:"10px 14px",marginBottom:12,fontSize:12}}>🧪 デモモード：LINE通知はコンソールに出力されます（LINE Messaging API未設定）</div>}
      {shipA.length>0&&(<div style={{marginBottom:14}}><div style={{fontWeight:700,fontSize:13,color:C.orange,marginBottom:8,paddingBottom:6,borderBottom:`2px solid ${C.orange}33`}}>📅 本日の発送・納品予定</div>{shipA.map((s,i)=><Card key={i} title={s.label} sub={s.sub} color={s.color}/>)}</div>)}
      <div style={{fontWeight:700,fontSize:13,color:C.cyan,marginBottom:8,paddingBottom:6,borderBottom:`2px solid ${C.cyan}33`}}>🛒 EC・ふるさと納税</div>
      {ecA.length===0?<div style={{fontSize:13,color:C.green,padding:"8px 0 14px"}}>✅ アラートなし</div>:ecA.map(o=>(<Card key={o.id} title={`${o.id} — ${o.customer}`} sub={o.product} issues={[!o.stock&&"⛔ 在庫なし",!o.payment&&"⛔ 決済未確認",o.status==="未対応"&&"⚡ 未対応",!o.assigned&&"👤 担当未割当"].filter(Boolean)}/>))}
      <div style={{fontWeight:700,fontSize:13,color:C.gold,marginBottom:8,marginTop:6,paddingBottom:6,borderBottom:`2px solid ${C.gold}33`}}>📦 卸先管理</div>
      {wsA.length===0?<div style={{fontSize:13,color:C.green,padding:"8px 0 14px"}}>✅ アラートなし</div>:wsA.map(w=>(<Card key={w.id} title={`${w.id} — ${w.client}`} sub={w.product} issues={[w.purchaseStatus==="未発注"&&"⚡ 発注未完了",!w.invoiceIssued&&"📄 納品書未発行",!w.salesRecorded&&"💴 売上未計上"].filter(Boolean)}/>))}

      </div>

      <div style={{background:C.card,border:`1px solid ${C.border}`,borderLeft:`4px solid ${C.lineGreen}`,borderRadius:8,padding:14,marginTop:12}}>

          {icon:"⏰",label:"60分ごと",desc:"未対応アラートの定期チェック・通知"},

function FinanceTab({orders,wholesale,furusatoOrders=[],reports,onExport}){
  const ecSales=orders.filter(o=>["発送済み","完了"].includes(o.status)).reduce((s,o)=>s+o.amount,0);
  const fnSales=furusatoOrders.reduce((s,o)=>s+getFnSalesPrice(o.productName||o.product_name),0);
  const wsSales=wholesale.filter(w=>w.salesRecorded).reduce((s,w)=>s+w.amount,0);
  const total=ecSales+wsSales+fnSales;
  const pending=wholesale.filter(w=>!w.salesRecorded).reduce((s,w)=>s+w.amount,0);
  const bd=orders.reduce((acc,o)=>{if(["発送済み","完了"].includes(o.status))acc[o.type]=(acc[o.type]||0)+o.amount;return acc;},{});
  // 月別集計を実データから生成
  const monthlyMap={};
  [...orders].forEach(o=>{
    const m=(o.shipDate||o.created||"").substring(0,7);
    if(!m)return;
    if(!monthlyMap[m])monthlyMap[m]={month:m,ec:0,furusato:0,wholesale:0};
    if(["発送済み","完了"].includes(o.status))monthlyMap[m].ec+=o.amount||0;
  });
  furusatoOrders.forEach(o=>{
    const m=(o.scheduledShipDate||o.scheduled_shipment_date||o.shipment_request_date||"").substring(0,7);
    if(!m)return;
    if(!monthlyMap[m])monthlyMap[m]={month:m,ec:0,furusato:0,wholesale:0};
    monthlyMap[m].furusato+=getFnSalesPrice(o.productName||o.product_name);
  });
  wholesale.forEach(w=>{
    const m=(w.shipDate||w.created||"").substring(0,7);
    if(!m)return;
    if(!monthlyMap[m])monthlyMap[m]={month:m,ec:0,furusato:0,wholesale:0};
    if(w.salesRecorded)monthlyMap[m].wholesale+=w.amount||0;
  });
  const dynamicReports=Object.values(monthlyMap).sort((a,b)=>a.month.localeCompare(b.month));
  const activeReports=dynamicReports.length>0?dynamicReports:reports;
  const maxBar=Math.max(...activeReports.map(r=>r.ec+r.furusato+r.wholesale),1);
  return(
    <div>
      <div style={{background:C.navy,borderRadius:10,padding:"18px 20px",marginBottom:14,color:"white"}}>
        <div style={{fontSize:11,opacity:0.7,marginBottom:4}}>今月の確定売上</div>
        <div style={{fontSize:28,fontWeight:800,color:C.goldL}}>¥{fmt(total)}</div>
        <div style={{fontSize:11,opacity:0.6,marginTop:4}}>未計上: ¥{fmt(pending)}</div>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        <button onClick={()=>onExport("ec")} style={{flex:1,padding:"10px 0",borderRadius:8,background:"white",border:`1px solid ${C.border}`,color:C.navy,fontWeight:700,fontSize:12,cursor:"pointer"}}>📥 EC注文</button>
        <button onClick={()=>onExport("ws")} style={{flex:1,padding:"10px 0",borderRadius:8,background:"white",border:`1px solid ${C.border}`,color:C.navy,fontWeight:700,fontSize:12,cursor:"pointer"}}>📥 卸先</button>
        <button onClick={()=>onExport("all")} style={{flex:1,padding:"10px 0",borderRadius:8,background:C.navy,color:"white",fontWeight:700,fontSize:12,cursor:"pointer",border:"none"}}>📥 全データ</button>
      </div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:16,marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:13,color:C.navy,marginBottom:12}}>📈 月次売上推移</div>
        {activeReports.map(r=>{const tot=r.ec+r.furusato+r.wholesale;return(<div key={r.month} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:12,fontWeight:600}}>{r.month}</span><span style={{fontSize:12,fontWeight:700,color:C.navy}}>¥{fmt(tot)}</span></div><div style={{display:"flex",borderRadius:4,overflow:"hidden",height:16,background:"#eee"}}><div style={{width:`${r.ec/maxBar*100}%`,background:C.cyan}}/><div style={{width:`${r.furusato/maxBar*100}%`,background:C.gold}}/><div style={{width:`${r.wholesale/maxBar*100}%`,background:C.green}}/></div></div>);})}
        <div style={{display:"flex",gap:12,marginTop:8,flexWrap:"wrap"}}>{[{l:"EC直販",c:C.cyan},{l:"ふるさと納税",c:C.gold},{l:"卸売",c:C.green}].map(x=>(<div key={x.l} style={{display:"flex",alignItems:"center",gap:5,fontSize:11}}><div style={{width:10,height:10,borderRadius:2,background:x.c}}/><span style={{color:C.sub}}>{x.l}</span></div>))}</div>
      </div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:16,marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:13,color:C.navy,marginBottom:10}}>📊 今月の内訳</div>
        {[{l:"EC直販",v:bd["EC"]||0,c:C.cyan},{l:"ふるさと納税",v:fnSales,c:C.gold},{l:"卸売（計上済）",v:wsSales,c:C.green},{l:"卸売（未計上）",v:pending,c:C.orange}].map(x=>(<div key={x.l} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:`1px solid ${C.border}`}}><div style={{width:10,height:10,borderRadius:"50%",background:x.c}}/><div style={{flex:1,fontSize:13}}>{x.l}</div><div style={{fontWeight:700,fontSize:14,color:x.c}}>¥{fmt(x.v)}</div></div>))}
        <div style={{display:"flex",justifyContent:"space-between",padding:"12px 0 0",fontWeight:800,fontSize:15}}><span>合計（確定）</span><span style={{color:C.navy}}>¥{fmt(total)}</span></div>
      </div>
    </div>
  );
}

// ── 自動取込タブ ──
function ImportTab({orders,setOrders,wholesale,setWholesale,furusatoOrders,setFurusatoOrders,showToast}){
  const [sec,setSec]=useState("csv");
  const [csvText,setCsvText]=useState("");
  const [csvType,setCsvType]=useState("furusato");
  const [preview,setPreview]=useState([]);
  const [importing,setImporting]=useState(false);
  const fileRef=useRef(null);
  const parseCSV=(text)=>{
    const lines=text.trim().split("\n").filter(l=>l.trim());
    if(lines.length<2)return[];
    const headers=lines[0].split(",").map(h=>h.replace(/"/g,"").trim());
    return lines.slice(1).map(line=>{
      const vals=[];let cur="",inQ=false;
      for(let c of line){if(c==='"'){inQ=!inQ;}else if(c===","&&!inQ){vals.push(cur.trim());cur="";}else cur+=c;}
      vals.push(cur.trim());
      const obj={};headers.forEach((h,i)=>obj[h]=vals[i]||"");return obj;
    });
  };
  const handleFile=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{const text=ev.target.result;setCsvText(text);setPreview(parseCSV(text).slice(0,5));};
    reader.readAsText(file,'Shift_JIS');
  };
  const handleImport=async()=>{
    if(!csvText){showToast("CSVファイルを選択してください","error");return;}
    setImporting(true);
    try{
      const rows=parseCSV(csvText);
      if(csvType==="furusato"){
        // 筑前町ふるさと納税CSV形式に対応
        const parseDate=s=>{if(!s)return null;const m=String(s).match(/(\d{4})年(\d{2})月(\d{2})日/);return m?`${m[1]}-${m[2]}-${m[3]}`:String(s).slice(0,10)||null;};
        const newFurusato=rows.filter(r=>r["寄附受付No"]&&/^\d+$/.test(String(r["寄附受付No"]).trim())).map(r=>({id:genId("FN"),delivery_no:r["配送No."]||"",donation_receipt_no:r["寄附受付No"]||"",product_name:r["謝礼品"]||"",operator_name:r["事業者"]||"",donor_no:r["寄附者No"]||"",last_name:r["配送　姓"]||"",first_name:r["配送　名"]||"",last_name_kana:r["配送　せい"]||"",first_name_kana:r["配送　めい"]||"",prefecture:r["配送　都道府県"]||"",postal_code:r["配送　郵便番号"]||"",address1:r["配送　住所１"]||"",address2:r["配送　住所２"]||"",phone:r["配送　電話番号"]||"",delivery_status:r["配送ステータス"]||"",tracking_number:r["伝票番号"]||"",carrier:r["配達業者"]||"",memo:r["メモ"]||r["備考"]||"",donation_status:r["寄附ステータス"]||"",donation_year:r["寄附年度"]||"",product_price:Number(String(r["謝礼品価格"]||0).replace(/[,¥￥]/g,"")),product_code:r["謝礼品番号"]||"",gift_type:r["贈答"]||"",donation_amount:Number(String(r["寄附金額"]||0).replace(/[,¥￥]/g,"")),donation_set_amount:Number(String(r["寄附設定金額"]||0).replace(/[,¥￥]/g,"")),shipment_request_date:parseDate(r["出荷依頼日"]),scheduled_shipment_date:parseDate(r["出荷予定日"]),created:nowStr()}));
        let saveErr1=null;
        if(!IS_DEMO){try{await db.upsert("furusato_orders",newFurusato);}catch(e){saveErr1=e.message;}}
        if(!saveErr1&&setFurusatoOrders)setFurusatoOrders(p=>[...newFurusato,...p]);
        if(saveErr1){showToast("Supabase保存エラー: "+saveErr1,"error");}else{showToast(`${newFurusato.length}件のふるさと納税データを取り込みました`);}
        await lineMessage(`📥【花立山養鰻】CSV取込完了\n📅 ${new Date().toLocaleString("ja-JP")}\n\n🏠 ふるさと納税：${newFurusato.length}件を取り込みました${saveErr1?"\n⚠️Supabase保存失敗: "+saveErr1:""}`);
      }else if(csvType==="ec"){

// ── カレンダータブ ──
function CalendarTab({orders,wholesale,furusatoOrders}){
  const [currentDate,setCurrentDate]=useState(new Date());
  const [selectedDay,setSelectedDay]=useState(null);
  const [selectedEvents,setSelectedEvents]=useState([]);

  const year=currentDate.getFullYear();
  const month=currentDate.getMonth();

  const monthName=new Date(year,month,1).toLocaleDateString("ja-JP",{year:"numeric",month:"long"});

  // 月の最初の日の曜日と日数
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();

  // イベントをまとめる
  const getEvents=(dateStr)=>{
    const evts=[];
    orders.forEach(o=>{
      const ecDate=o.shipDate||(o.created?o.created.slice(0,10).replace(/\//g,"-"):"")||"";
      if(ecDate===dateStr){
        evts.push({type:"ec",label:o.customer,sub:o.product,status:o.status,color:C.cyan});
      }
    });
    wholesale.forEach(w=>{
      if(w.shipDate===dateStr){
        evts.push({type:"ws",label:w.client,sub:w.product,status:w.deliveryStatus,color:C.gold});
      }
    });
    furusatoOrders.forEach(o=>{
      const fnDate=o.scheduledShipDate||o.scheduled_shipment_date||o.shipment_request_date||o.donationDate||"";
      if(fnDate===dateStr){
        const fnName=o.lastName?`${o.lastName} ${o.firstName||""}`.trim():o.last_name?`${o.last_name} ${o.first_name||""}`.trim():o.donorName||"寄附者";
        const fnProduct=o.productName||o.product_name||"";
        evts.push({type:"fn",label:fnName,sub:fnProduct,status:o.deliveryStatus||o.delivery_status||o.status||"配送中",color:"#9C6FD6"});
      }
    });
    return evts;
  };

  const todayStr=today();

  const handleDayClick=(d)=>{
    const dateStr=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const evts=getEvents(dateStr);
    setSelectedDay(dateStr);
    setSelectedEvents(evts);
  };

  const prevMonth=()=>setCurrentDate(new Date(year,month-1,1));
  const nextMonth=()=>setCurrentDate(new Date(year,month+1,1));

  const weeks=[];
  let days=[];
  for(let i=0;i<firstDay;i++)days.push(null);
  for(let d=1;d<=daysInMonth;d++){
    days.push(d);
    if(days.length===7){weeks.push(days);days=[];}
  }
  if(days.length>0){while(days.length<7)days.push(null);weeks.push(days);}

  // 今月の集計
  const monthStr=`${year}-${String(month+1).padStart(2,"0")}`;
  const monthEC=orders.filter(o=>(o.shipDate||o.created?.slice(0,7).replace(/\//g,"-")||"").startsWith(monthStr)).length;
  const monthWS=wholesale.filter(w=>w.shipDate?.startsWith(monthStr)).length;
  const monthFN=furusatoOrders.filter(o=>(o.scheduledShipDate||o.scheduled_shipment_date||o.donationDate||o.shipment_request_date||"").startsWith(monthStr)).length;

  return(
    <div>
      {/* 月次サマリー */}
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        <div style={{background:C.card,border:`1px solid ${C.cyan}44`,borderRadius:8,padding:"8px 10px",flex:1,textAlign:"center"}}>
          <div style={{fontSize:10,color:C.sub}}>🛒 EC</div>
          <div style={{fontSize:20,fontWeight:800,color:C.cyan}}>{monthEC}</div>
        </div>
        <div style={{background:C.card,border:`1px solid ${C.gold}44`,borderRadius:8,padding:"8px 10px",flex:1,textAlign:"center"}}>
          <div style={{fontSize:10,color:C.sub}}>📦 卸先</div>
          <div style={{fontSize:20,fontWeight:800,color:C.gold}}>{monthWS}</div>
        </div>
        <div style={{background:C.card,border:`1px solid #9C6FD644`,borderRadius:8,padding:"8px 10px",flex:1,textAlign:"center"}}>
          <div style={{fontSize:10,color:C.sub}}>🏠 ふるさと</div>
          <div style={{fontSize:20,fontWeight:800,color:"#9C6FD6"}}>{monthFN}</div>
        </div>
      </div>

      {/* カレンダーヘッダー */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",background:C.navy}}>
          <button onClick={prevMonth} style={{background:"none",border:"none",color:"white",fontSize:20,cursor:"pointer",padding:"0 8px"}}>‹</button>
          <div style={{color:"white",fontWeight:700,fontSize:15}}>{monthName}</div>
          <button onClick={nextMonth} style={{background:"none",border:"none",color:"white",fontSize:20,cursor:"pointer",padding:"0 8px"}}>›</button>
        </div>

        {/* 曜日ヘッダー */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:C.navy+"22"}}>
          {["日","月","火","水","木","金","土"].map((d,i)=>(
            <div key={d} style={{textAlign:"center",padding:"6px 0",fontSize:11,fontWeight:700,color:i===0?C.red:i===6?"#4488FF":C.sub}}>{d}</div>
          ))}
        </div>

        {/* 日付グリッド */}
        {weeks.map((week,wi)=>(
          <div key={wi} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",borderTop:`1px solid ${C.border}`}}>
            {week.map((d,di)=>{
              if(!d)return <div key={di} style={{minHeight:56,background:C.bg+"88"}}/>;
              const dateStr=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
              const evts=getEvents(dateStr);
              const isToday=dateStr===todayStr;
              const isSelected=dateStr===selectedDay;
              return(
                <div key={di} onClick={()=>handleDayClick(d)} style={{minHeight:56,padding:"3px",borderLeft:di>0?`1px solid ${C.border}`:"none",background:isSelected?C.gold+"22":isToday?C.cyan+"11":"white",cursor:"pointer",position:"relative"}}>
                  <div style={{fontSize:12,fontWeight:isToday?800:400,color:isToday?C.cyan:di===0?C.red:di===6?"#4488FF":C.text,marginBottom:2,width:20,height:20,borderRadius:"50%",background:isToday?C.cyan:"none",color:isToday?"white":di===0?C.red:di===6?"#4488FF":C.text,display:"flex",alignItems:"center",justifyContent:"center"}}>{d}</div>
                  {evts.slice(0,2).map((e,ei)=>(
                    <div key={ei} style={{fontSize:9,background:e.color+"22",color:e.color,borderRadius:2,padding:"1px 3px",marginBottom:1,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",fontWeight:600}}>{e.label}</div>
                  ))}
                  {evts.length>2&&<div style={{fontSize:9,color:C.sub}}>+{evts.length-2}</div>}
                </div>
              );
            })}
          </div>
        ))}
      </div>

      {/* 凡例 */}
      <div style={{display:"flex",gap:12,marginTop:10,flexWrap:"wrap"}}>
        {[{color:C.cyan,label:"🛒 EC注文"},{color:C.gold,label:"📦 卸先"},{color:"#9C6FD6",label:"🏠 ふるさと納税"}].map((l,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:C.sub}}>
            <div style={{width:10,height:10,borderRadius:2,background:l.color}}/>
            {l.label}
          </div>
        ))}
      </div>

      {/* 選択日の詳細 */}
      {selectedDay&&(
        <div style={{marginTop:12,background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
          <div style={{fontWeight:700,fontSize:13,color:C.navy,marginBottom:10}}>
            📅 {new Date(selectedDay+"T00:00:00").toLocaleDateString("ja-JP",{month:"long",day:"numeric",weekday:"short"})}の予定
          </div>
          {selectedEvents.length===0?(
            <div style={{fontSize:13,color:C.sub,textAlign:"center",padding:"12px 0"}}>予定なし</div>
          ):(
            selectedEvents.map((e,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
                <div style={{width:4,height:36,borderRadius:2,background:e.color,flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:13,color:C.text}}>{e.label}</div>
                  <div style={{fontSize:11,color:C.sub}}>{e.sub}</div>
                </div>
                <div style={{fontSize:11,background:e.color+"22",color:e.color,padding:"3px 8px",borderRadius:10,fontWeight:600}}>{e.status||"未対応"}</div>
              </div>
            ))
          )}
        </div>
      )}
    </div>
  );
}

          <Row label="寄附受付No." value={detail.donation_receipt_no||detail.donationReceiptNo||"-"}/>
          <Row label="配送ステータス" value={detail.delivery_status||detail.status||"未対応"}/>
          <Row label="伝票番号" value={detail.tracking_number||"-"}/>
          <Row label="配送業者" value={detail.carrier||"-"}/>

          <Row label="謝礼品価格" value={detail.product_price?`¥${Number(detail.product_price).toLocaleString()}`:"-"}/>
          <Row label="寄附年度" value={detail.donation_year||"-"}/>

                  const updated={...detail,status:s};

                }} style={{padding:"8px 14px",borderRadius:6,border:"none",background:detail.status===s?C.gold:C.bg,color:detail.status===s?"white":C.text,fontSize:13,cursor:"pointer",fontWeight:detail.status===s?700:400}}>{s}</button>
              ))}

            <button onClick={async()=>{if(window.confirm("削除しますか？")){await onDel("furusato_orders","id",detail.id);setFurusatoOrders(p=>p.filter(o=>o.id!==detail.id));setDetail(null);showToast("削除しました");}}} style={{width:"100%",padding:"10px 0",borderRadius:8,border:"none",background:C.red+"22",color:C.red,fontSize:13,cursor:"pointer",fontWeight:700}}>🗑 削除</button>

      )}
    </div>
  );
}

// ══════════════════════════════
//  サブスクリプション管理タブ
// ══════════════════════════════
function SubscripTab({showToast}){
  const [members,setMembers]=useState([]);
  const [loading,setLoading]=useState(false);
  const [sec,setSec]=useState("members");
  const [form,setForm]=useState({name:"",email:"",tel:"",plan:"ume",address:"",start:new Date().toISOString().slice(0,10),status:"active"});
  const PLAN_MAP={ume:{label:"梅プラン",price:4500,content:"蒲焼2尾"},take:{label:"竹プラン",price:8000,content:"蒲焼4尾"}};

  useEffect(()=>{loadMembers();},[]);

  async function loadMembers(){
    setLoading(true);
    try{
      const r=await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/subscrip_members?select=*&order=created_at.desc`,{
        headers:{"apikey":CONFIG.SUPABASE_ANON_KEY,"Authorization":`Bearer ${CONFIG.SUPABASE_ANON_KEY}`}
      });
      if(r.ok){const d=await r.json();setMembers(d);}
    }catch(e){console.error(e);}
    setLoading(false);
  }

  async function addMember(){
    if(!form.name||!form.email){showToast("名前とメールは必須です","error");return;}
    const id="sub_"+Date.now();
    const row={id,name:form.name,email:form.email,tel:form.tel,plan:form.plan,address:form.address,start_date:form.start,status:form.status,created_at:new Date().toISOString(),next_charge:form.start,charge_count:0};
    try{
      const r=await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/subscrip_members`,{
        method:"POST",
        headers:{"apikey":CONFIG.SUPABASE_ANON_KEY,"Authorization":`Bearer ${CONFIG.SUPABASE_ANON_KEY}`,"Content-Type":"application/json","Prefer":"return=representation"},
        body:JSON.stringify(row)
      });
      if(r.ok){showToast("会員登録完了");loadMembers();setSec("members");}
      else{const e=await r.json();showToast("エラー: "+JSON.stringify(e),"error");}
    }catch(e){showToast("エラー","error");}
  }

  async function updateStatus(id,status){
    try{
      await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/subscrip_members?id=eq.${id}`,{
        method:"PATCH",
        headers:{"apikey":CONFIG.SUPABASE_ANON_KEY,"Authorization":`Bearer ${CONFIG.SUPABASE_ANON_KEY}`,"Content-Type":"application/json"},
        body:JSON.stringify({status})
      });
      showToast(status==="active"?"再開しました":"停止しました");
      loadMembers();
    }catch(e){showToast("エラー","error");}
  }

  async function runMonthlyCharge(){
    const active=members.filter(m=>m.status==="active");
    if(active.length===0){showToast("アクティブ会員なし");return;}
    setLoading(true);
    let success=0;
    for(const m of active){
      const plan=PLAN_MAP[m.plan];
      try{
        // 決済ログに記録
        await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/subscrip_charges`,{
          method:"POST",
          headers:{"apikey":CONFIG.SUPABASE_ANON_KEY,"Authorization":`Bearer ${CONFIG.SUPABASE_ANON_KEY}`,"Content-Type":"application/json"},
          body:JSON.stringify({id:"chg_"+Date.now()+"_"+m.id,member_id:m.id,member_name:m.name,plan:m.plan,amount:plan.price,status:"pending",charge_date:new Date().toISOString().slice(0,10),created_at:new Date().toISOString()})
        });
        success++;
      }catch(e){}
    }
    // LINE通知
    await fetch("/api/line-message",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:`【サブスク月次処理】\n対象会員:${active.length}名\n処理完了:${success}名\nStripe決済は別途実行してください`})});
    showToast(`${success}件の月次処理を記録しました`);
    setLoading(false);
  }

  async function sendShippingList(){
    const active=members.filter(m=>m.status==="active");
    const list=active.map((m,i)=>`${i+1}. ${m.name} / ${PLAN_MAP[m.plan]?.label} / ${m.address||"住所未登録"}`).join("\n");
    const msg=`【サブスク発送リスト】\n${new Date().toLocaleDateString("ja-JP")}\n会員数:${active.length}名\n\n${list}\n\n発送をお願いします`;
    await fetch("/api/line-message",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:msg})});
    showToast("昭次郎さんのLINEに発送リストを送信しました");
  }

  const totalMonthly=members.filter(m=>m.status==="active").reduce((s,m)=>s+(PLAN_MAP[m.plan]?.price||0),0);
  const S={
    card:{background:"#fff",border:"1px solid #e0d8cc",borderRadius:6,padding:16,marginBottom:12},
    badge:(c)=>({display:"inline-block",padding:"2px 8px",borderRadius:3,fontSize:11,background:c==="active"?"#27ae6020":c==="paused"?"#f39c1220":"#e74c3c20",color:c==="active"?"#27ae60":c==="paused"?"#f39c12":"#e74c3c",fontWeight:500}),
    btn:(c)=>({padding:"8px 16px",background:c||"#C8963E",color:"#fff",border:"none",borderRadius:4,cursor:"pointer",fontSize:13,fontFamily:"inherit"}),
    secBtn:(active)=>({padding:"8px 16px",background:active?"#C8963E":"#f0ede8",color:active?"#fff":"#666",border:"1px solid "+(active?"#C8963E":"#ddd"),borderRadius:4,cursor:"pointer",fontSize:13,fontFamily:"inherit"}),
  };

  return(
    <div style={{padding:16}}>
      {/* サマリ */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
        {[
          {label:"アクティブ会員",val:members.filter(m=>m.status==="active").length+"名",color:"#27ae60"},
          {label:"月間売上見込",val:"¥"+totalMonthly.toLocaleString(),color:"#C8963E"},
          {label:"年間換算",val:"¥"+(totalMonthly*12).toLocaleString(),color:"#1e4d6b"},
        ].map(m=>(
          <div key={m.label} style={{background:"#fff",border:"1px solid #e0d8cc",borderRadius:6,padding:12,textAlign:"center"}}>
            <div style={{fontSize:18,fontWeight:700,color:m.color}}>{m.val}</div>
            <div style={{fontSize:11,color:"#888",marginTop:4}}>{m.label}</div>
          </div>
        ))}
      </div>

      {/* セクション切替 */}
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        {[{id:"members",label:"会員一覧"},{id:"add",label:"＋ 会員追加"},{id:"actions",label:"⚡ AI自動実行"}].map(s=>(
          <button key={s.id} style={S.secBtn(sec===s.id)} onClick={()=>setSec(s.id)}>{s.label}</button>
        ))}
      </div>

      {/* 会員一覧 */}
      {sec==="members"&&(
        <div>
          {loading&&<div style={{textAlign:"center",color:"#888",padding:20}}>読み込み中…</div>}
          {!loading&&members.length===0&&(
            <div style={{textAlign:"center",padding:32,color:"#aaa"}}>
              <div style={{fontSize:32,marginBottom:8}}>♻️</div>
              <div>会員がいません。「会員追加」から登録してください。</div>
            </div>
          )}
          {members.map(m=>(
            <div key={m.id} style={S.card}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
                <div>
                  <div style={{fontWeight:600,fontSize:15}}>{m.name}</div>
                  <div style={{fontSize:12,color:"#888",marginTop:2}}>{m.email} {m.tel&&`/ ${m.tel}`}</div>
                  <div style={{marginTop:6,display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                    <span style={S.badge(m.status)}>{m.status==="active"?"稼働中":m.status==="paused"?"休止中":"解約"}</span>
                    <span style={{fontSize:12,background:"#f0ede8",padding:"2px 8px",borderRadius:3}}>{PLAN_MAP[m.plan]?.label} ¥{(PLAN_MAP[m.plan]?.price||0).toLocaleString()}/月</span>
                    <span style={{fontSize:11,color:"#aaa"}}>開始: {m.start_date}</span>
                  </div>
                  {m.address&&<div style={{fontSize:11,color:"#888",marginTop:4}}>📍 {m.address}</div>}
                </div>
                <div style={{display:"flex",gap:6}}>
                  {m.status==="active"?
                    <button style={{...S.btn("#e67e22"),fontSize:11,padding:"6px 12px"}} onClick={()=>updateStatus(m.id,"paused")}>休止</button>:
                    <button style={{...S.btn("#27ae60"),fontSize:11,padding:"6px 12px"}} onClick={()=>updateStatus(m.id,"active")}>再開</button>
                  }
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* 会員追加フォーム */}
      {sec==="add"&&(
        <div style={S.card}>
          <div style={{fontWeight:600,marginBottom:14}}>新規会員登録</div>
          {[
            {label:"お名前 *",key:"name",type:"text",placeholder:"山田太郎"},
            {label:"メールアドレス *",key:"email",type:"email",placeholder:"example@email.com"},
            {label:"電話番号",key:"tel",type:"tel",placeholder:"090-0000-0000"},
            {label:"住所",key:"address",type:"text",placeholder:"福岡県…"},
            {label:"開始日",key:"start",type:"date"},
          ].map(f=>(
            <div key={f.key} style={{marginBottom:12}}>
              <div style={{fontSize:12,color:"#666",marginBottom:4}}>{f.label}</div>
              <input type={f.type} value={form[f.key]} onChange={e=>setForm({...form,[f.key]:e.target.value})}
                placeholder={f.placeholder} style={{width:"100%",padding:"8px 10px",border:"1px solid #ddd",borderRadius:4,fontSize:14,fontFamily:"inherit"}}/>
            </div>
          ))}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,color:"#666",marginBottom:4}}>プラン *</div>
            <select value={form.plan} onChange={e=>setForm({...form,plan:e.target.value})}
              style={{width:"100%",padding:"8px 10px",border:"1px solid #ddd",borderRadius:4,fontSize:14,fontFamily:"inherit"}}>
              <option value="ume">梅プラン — ¥4,500/月（蒲焼2尾）</option>
              <option value="take">竹プラン — ¥8,000/月（蒲焼4尾）</option>
            </select>
          </div>
          <button style={{...S.btn(),width:"100%",padding:12,fontSize:15}} onClick={addMember}>会員登録する</button>
        </div>
      )}

      {/* AI自動実行 */}
      {sec==="actions"&&(
        <div>
          {[
            {label:"📦 発送リストをLINE送信",desc:"アクティブ会員の発送リストを昭次郎さんのLINEに自動送信",action:sendShippingList,color:"#1e4d6b"},
            {label:"💳 月次処理を実行",desc:"全アクティブ会員の月次決済ログを記録・LINE通知",action:runMonthlyCharge,color:"#C8963E"},
          ].map(a=>(
            <div key={a.label} style={S.card}>
              <div style={{fontWeight:600,marginBottom:4}}>{a.label}</div>
              <div style={{fontSize:12,color:"#888",marginBottom:12}}>{a.desc}</div>
              <button style={{...S.btn(a.color)}} onClick={a.action} disabled={loading}>{loading?"処理中…":"実行する"}</button>
            </div>
          ))}
          <div style={{background:"#fff8ec",border:"1px solid #f0c060",borderRadius:6,padding:14,marginTop:8}}>
            <div style={{fontWeight:600,fontSize:13,marginBottom:6}}>🔜 次のフェーズで自動化予定</div>
            <ul style={{fontSize:12,color:"#888",paddingLeft:16,lineHeight:2}}>
              <li>Stripe連携で月次決済を完全自動化</li>
              <li>毎月1日にVercel Cronで自動実行</li>
              <li>解約防止メールのAI自動送信</li>
              <li>Instagram自動投稿（集客AI）</li>
            </ul>
          </div>
        </div>
      )}
    </div>
  );
}

          <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:12}}>{staff.map(s=>(<div key={s} style={{display:"flex",alignItems:"center",gap:5,background:C.navy+"11",border:`1px solid ${C.navy}33`,borderRadius:20,padding:"6px 12px"}}><span style={{fontSize:13,fontWeight:700,color:C.navy}}>{s}</span><button onClick={()=>setConfirm({msg:`「${s}」を削除しますか？`,onOk:()=>{setStaff(p=>p.filter(x=>x!==s));setConfirm(null);showToast("削除しました");}})} style={{border:"none",background:"none",color:C.red,fontSize:16,cursor:"pointer",lineHeight:1,padding:"0 2px"}}>×</button></div>))}</div>

            <Lbl t="初期在庫数"/><Inp type="number" value={np.stock} onChange={v=>setNp(f=>({...f,stock:v}))} placeholder="0"/>
            <Lbl t="カテゴリ"/><select value={np.category} onChange={e=>setNp(f=>({...f,category:e.target.value}))} style={{width:"100%",padding:"10px 12px",borderRadius:8,border:`1px solid ${C.border}`,fontSize:14,background:"white"}}><option>EC</option><option>ふるさと納税</option><option>卸売</option></select>
            <button onClick={addProd} style={{width:"100%",padding:"11px 0",borderRadius:8,background:C.cyan,color:"white",fontWeight:700,fontSize:13,border:"none",cursor:"pointer",marginTop:12}}>＋ 商品を追加</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>{products.map(p=>(<div key={p.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px"}}>{epId===p.id?(<div><Lbl t="商品名"/><Inp value={p.name} onChange={v=>setProducts(prev=>prev.map(x=>x.id===p.id?{...x,name:v}:x))}/><Lbl t="価格（円）"/><Inp type="number" value={p.price} onChange={v=>setProducts(prev=>prev.map(x=>x.id===p.id?{...x,price:Number(v)}:x))}/><Lbl t="在庫数"/><Inp type="number" value={p.stock||0} onChange={v=>setProducts(prev=>prev.map(x=>x.id===p.id?{...x,stock:Number(v)}:x))}/><button onClick={()=>setEpId(null)} style={{width:"100%",padding:"9px 0",borderRadius:6,border:`1px solid ${C.border}`,background:"white",fontSize:12,cursor:"pointer",marginTop:10}}>✓ 完了</button></div>):(<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:700,fontSize:13}}>{p.name}</div><div style={{fontSize:12,color:C.sub}}>¥{fmt(p.price)} | 在庫:{p.stock||0} | <Badge label={p.category} color={p.category==="EC"?C.cyan:p.category==="卸売"?C.green:C.gold}/></div></div><div style={{display:"flex",gap:6}}><SmallBtn onClick={()=>setEpId(p.id)} label="編集" color={C.gold} bg={C.goldBg}/><SmallBtn onClick={()=>setConfirm({msg:`「${p.name}」を削除しますか？`,onOk:()=>{setProducts(prev=>prev.filter(x=>x.id!==p.id));setConfirm(null);showToast("削除しました");}})} label="削除" color={C.red} bg={C.red+"11"}/></div></div>)}</div>))}</div>
        </div>
      )}
      {sec==="clients"&&(
        <div>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderLeft:`4px solid ${C.green}`,borderRadius:8,padding:"14px 16px",marginBottom:12}}>
            <div style={{fontWeight:800,fontSize:14,color:C.green,marginBottom:10}}>得意先を追加</div>
            <Lbl t="会社名 *"/><Inp value={nc.name} onChange={v=>setNc(f=>({...f,name:v}))} placeholder="例：博多うなぎ料理店"/>
            <Lbl t="電話番号"/><Inp value={nc.tel} onChange={v=>setNc(f=>({...f,tel:v}))} placeholder="例：092-123-4567"/>
            <Lbl t="住所"/><Inp value={nc.address} onChange={v=>setNc(f=>({...f,address:v}))} placeholder="例：福岡市博多区"/>
            <Lbl t="メモ"/><Inp value={nc.memo} onChange={v=>setNc(f=>({...f,memo:v}))} placeholder="備考"/>
            <button onClick={addClient} style={{width:"100%",padding:"11px 0",borderRadius:8,background:C.green,color:"white",fontWeight:700,fontSize:13,border:"none",cursor:"pointer",marginTop:12}}>＋ 得意先を追加</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>{clients.map(c=>(<div key={c.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px"}}>{ecId===c.id?(<div><Lbl t="会社名"/><Inp value={c.name} onChange={v=>setClients(prev=>prev.map(x=>x.id===c.id?{...x,name:v}:x))}/><Lbl t="電話番号"/><Inp value={c.tel||""} onChange={v=>setClients(prev=>prev.map(x=>x.id===c.id?{...x,tel:v}:x))}/><Lbl t="住所"/><Inp value={c.address||""} onChange={v=>setClients(prev=>prev.map(x=>x.id===c.id?{...x,address:v}:x))}/><Lbl t="メモ"/><Inp value={c.memo||""} onChange={v=>setClients(prev=>prev.map(x=>x.id===c.id?{...x,memo:v}:x))}/><button onClick={()=>setEcId(null)} style={{width:"100%",padding:"9px 0",borderRadius:6,border:`1px solid ${C.border}`,background:"white",fontSize:12,cursor:"pointer",marginTop:10}}>✓ 完了</button></div>):(<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:700,fontSize:13}}>{c.name}</div><div style={{fontSize:12,color:C.sub}}>{c.tel||"—"} {c.address&&`| ${c.address}`}</div>{c.memo&&<div style={{fontSize:11,color:C.orange}}>📝 {c.memo}</div>}</div><div style={{display:"flex",gap:6}}><SmallBtn onClick={()=>setEcId(c.id)} label="編集" color={C.gold} bg={C.goldBg}/><SmallBtn onClick={()=>setConfirm({msg:`「${c.name}」を削除しますか？`,onOk:()=>{setClients(prev=>prev.filter(x=>x.id!==c.id));setConfirm(null);showToast("削除しました");}})} label="削除" color={C.red} bg={C.red+"11"}/></div></div>)}</div>))}</div>
        </div>
      )}
      {sec==="backup"&&(
        <div>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderLeft:`4px solid ${C.navy}`,borderRadius:8,padding:"14px 16px",marginBottom:12}}>
            <div style={{fontWeight:800,fontSize:14,color:C.navy,marginBottom:6}}>💾 データバックアップ（CSV）</div>
            <div style={{fontSize:12,color:C.sub,marginBottom:14}}>データをCSVファイルとしてダウンロードできます。Excelで開くことができます。週1回の定期バックアップを推奨します。</div>
            {[{l:"📥 EC注文データ",k:"ec"},{l:"📥 卸先注文データ",k:"ws"},{l:"📥 商品マスタ",k:"products"},{l:"📥 得意先マスタ",k:"clients"},{l:"📥 日報データ",k:"diary"},{l:"📥 在庫履歴",k:"inventory"}].map(b=>(<button key={b.k} onClick={()=>onExportAll(b.k)} style={{width:"100%",padding:"11px 0",borderRadius:8,background:"white",border:`1px solid ${C.border}`,color:C.navy,fontWeight:700,fontSize:13,cursor:"pointer",marginBottom:8}}>{b.l}</button>))}
            <button onClick={()=>onExportAll("all")} style={{width:"100%",padding:"12px 0",borderRadius:8,background:C.navy,color:"white",fontWeight:700,fontSize:13,cursor:"pointer",border:"none",marginTop:4}}>📥 全データをまとめてダウンロード</button>
          </div>
          <div style={{background:C.gold+"11",border:`1px solid ${C.gold}44`,borderRadius:8,padding:14,fontSize:12,color:C.text,lineHeight:1.7}}>💡 <strong>推奨：</strong>週1回、全データをダウンロードして保管してください。</div>
        </div>
      )}
    </div>
  );
}

// ── メインアプリ ──
function App(){
  const [loggedIn,setLoggedIn]=React.useState(false);
  const [tab,setTab]=React.useState("ec");
  const [orders,setOrders]=React.useState([]);
  const [wholesale,setWholesale]=React.useState([]);
  const [furusatoOrders,setFurusatoOrders]=React.useState([]);
  const [products,setProducts]=React.useState([]);
  const [clients,setClients]=React.useState([]);
  const [staff,setStaff]=React.useState([]);
  const [diary,setDiary]=React.useState([]);
  const [inventory,setInventory]=React.useState([]);
  const [reports,setReports]=React.useState([]);
  const [toast,setToast]=React.useState({msg:"",type:""});
  const [lineSending,setLineSending]=React.useState(false);
  const [autoNotifyEnabled,setAutoNotifyEnabled]=React.useState(true);
  const [notifyLog,setNotifyLog]=React.useState([]);

  React.useEffect(()=>{
    if(!loggedIn||IS_DEMO)return;
    (async()=>{
      try{
        const [ec,ws,fn,pr,cl,st,dr,inv]=await Promise.all([
          db.select("ec_orders"),db.select("ws_orders"),db.select("furusato_orders"),
          db.select("products"),db.select("clients"),db.select("staff"),
          db.select("diary"),db.select("inventory"),
        ]);
        setOrders(ec||[]);setWholesale(ws||[]);setFurusatoOrders(fn||[]);
        setProducts(pr||[]);setClients(cl||[]);
        setStaff((st||[]).map(s=>s.name||s));
        setDiary(dr||[]);setInventory(inv||[]);
      }catch(e){console.log("DB読込エラー",e);}
    })();
  },[loggedIn]);

  const showToast=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast({msg:"",type:""}),3000);};

  const onSave=async(table,data)=>{
    if(IS_DEMO)return;
    try{await db.upsert(table,data);}catch(e){showToast("保存エラー: "+e.message,"error");}
  };
  const onDel=async(table,col,val)=>{
    if(IS_DEMO)return;
    try{await db.del(table,col,val);}catch(e){showToast("削除エラー","error");}
  };

  const sendLineAlert=async()=>{
    setLineSending(true);
    const alertOrders=orders.filter(o=>o.alert);
    const msg=`⚠️【花立山養鰻】要対応アラート
📅 ${new Date().toLocaleString("ja-JP")}

EC未対応: ${alertOrders.length}件
${alertOrders.slice(0,3).map(o=>`・${o.customer}（${o.product}）`).join("
")}`;
    await lineMessage(msg);
    setNotifyLog(p=>[{id:genId("L"),type:"手動LINE通知",msg:`要対応${alertOrders.length}件を通知`,time:nowStr()},...p.slice(0,9)]);
    setLineSending(false);
    showToast("LINE通知を送信しました");
  };

  const sendMorningReport=async()=>{
    const todayShip=orders.filter(o=>o.shipDate===today()&&!["発送済み","完了"].includes(o.status));
    const msg=`🌅【花立山養鰻】おはようございます
📅 ${new Date().toLocaleDateString("ja-JP")}

📦 本日の発送予定：${todayShip.length}件
⚠️ 要対応：${orders.filter(o=>o.alert).length}件

✅ 自動日次レポート`;
    await lineMessage(msg);
    showToast("日次レポートを送信しました");
  };

  const onExport=(type)=>{
    if(type==="ec")exportCSV(orders,"EC注文");
    else if(type==="ws")exportCSV(wholesale,"卸先注文");
    else if(type==="all"){exportCSV(orders,"EC注文");exportCSV(wholesale,"卸先注文");}
  };
  const onExportAll=(key)=>{
    const map={ec:orders,ws:wholesale,products,clients,diary,inventory};
    if(key==="all"){Object.entries(map).forEach(([k,v])=>exportCSV(v,k));}
    else exportCSV(map[key]||[],key);
  };

  if(!loggedIn)return <LoginScreen onLogin={()=>setLoggedIn(true)}/>;

  return(
    <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",background:C.bg,paddingBottom:80}}>
      <div style={{background:C.navy,padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:100}}>
        <div style={{color:C.goldL,fontWeight:800,fontSize:16}}>花立山養鰻</div>
        <div style={{color:"rgba(255,255,255,0.6)",fontSize:11}}>{TABS.find(t=>t.id===tab)?.label}</div>
      </div>
      <div style={{padding:"14px 16px"}}>
        {tab==="ec"&&<EcTab orders={orders} setOrders={setOrders} furusatoOrders={furusatoOrders} staff={staff} products={products} showToast={showToast} onSave={onSave} onDel={onDel}/>}
        {tab==="furusato"&&<FurusatoTab furusatoOrders={furusatoOrders} setFurusatoOrders={setFurusatoOrders} showToast={showToast} onDel={onDel}/>}
        {tab==="diary"&&<DiaryTab diary={diary} setDiary={setDiary} staff={staff} showToast={showToast} onDel={onDel} onSave={onSave}/>}
        {tab==="alert"&&<AlertTab orders={orders} wholesale={wholesale} onLine={sendLineAlert} lineSending={lineSending} autoNotifyEnabled={autoNotifyEnabled} setAutoNotifyEnabled={setAutoNotifyEnabled} notifyLog={notifyLog} onMorning={sendMorningReport}/>}
        {tab==="calendar"&&<CalendarTab orders={orders} wholesale={wholesale} furusatoOrders={furusatoOrders}/>}
        {tab==="inventory"&&<InventoryTab products={products} setProducts={setProducts} inventory={inventory} setInventory={setInventory} showToast={showToast}/>}
        {tab==="wholesale"&&<WholesaleTab wholesale={wholesale} setWholesale={setWholesale} products={products} clients={clients} showToast={showToast} onSave={onSave} onDel={onDel}/>}
        {tab==="finance"&&<FinanceTab orders={orders} wholesale={wholesale} furusatoOrders={furusatoOrders} reports={reports} onExport={onExport}/>}
        {tab==="import"&&<ImportTab orders={orders} setOrders={setOrders} wholesale={wholesale} setWholesale={setWholesale} furusatoOrders={furusatoOrders} setFurusatoOrders={setFurusatoOrders} showToast={showToast}/>}
        {tab==="setup"&&<SetupTab staff={staff} setStaff={setStaff} products={products} setProducts={setProducts} clients={clients} setClients={setClients} showToast={showToast} onExportAll={onExportAll}/>}
        {tab==="subscrip"&&<SubscripTab showToast={showToast}/>}
      </div>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"white",borderTop:`1px solid ${C.border}`,display:"flex",overflowX:"auto",zIndex:200}}>
        {TABS.map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={{flex:"0 0 auto",padding:"8px 10px",border:"none",background:tab===t.id?C.goldBg:"white",color:tab===t.id?C.gold:C.sub,fontSize:9,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,minWidth:52,fontWeight:tab===t.id?700:400}}><span style={{fontSize:16}}>{t.icon}</span>{t.label}</button>))}
      </div>
      <Toast msg={toast.msg} type={toast.type}/>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
